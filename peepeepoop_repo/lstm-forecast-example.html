                    <span class="nhp-stat">${(s.confidence * 100).toFixed(0)}%</span>
                </div>`;
            }).join('');

            const overallColor = acc.overall !== null ? (parseInt(acc.overall) >= 50 ? '#6fcf97' : '#eb5757') : '#e8e6e3';

            return `
                <div class="nhp-section">
                    <div class="nhp-section-header">
                        <div>
                            <span class="nhp-section-title">Neural Hawkes Process</span>
                            <span class="nhp-status-badge" style="color:${statusColor};border:1px solid ${statusColor}33;">${statusText}</span>
                        </div>
                        <span class="nhp-bars-label">${nhp.bars || '?'} bars${nhp.data_source && nhp.data_source !== 'yfinance' ? ' · <span style="color:#6fcf97;">GDrive+YF</span>' : ''}</span>
                    </div>
                    <div class="nhp-tf-selector">
                        <label>NHP Timeframe</label>
                        <select id="nhpTimeframeSelect">${tfSelect}</select>
                    </div>
                    <div style="display:flex;justify-content:space-between;align-items:center;">
                        <div class="nhp-chart-label">Price + Signals</div>
                        <div class="nhp-scroll-hint">scroll to pan · ctrl+scroll to zoom</div>
                    </div>
                    <div class="nhp-price-chart" id="nhpPriceChartContainer">
                        <canvas id="nhpPriceCanvas"></canvas>
                        <div class="nhp-crosshair-tooltip" id="nhpTooltip" style="display:none;"></div>
                    </div>
                    <div class="nhp-accuracy-row">
                        <div class="nhp-accuracy-stat">
                            <div class="acc-label">Overall Accuracy</div>
                            <div class="acc-value" style="color:${overallColor}">${acc.overall !== null ? acc.overall + '%' : '—'}</div>
                        </div>
                        <div class="nhp-accuracy-stat">
                            <div class="acc-label">Enter Accuracy</div>
                            <div class="acc-value" style="color:#6fcf97">${acc.enter !== null ? acc.enter + '% (' + acc.enterCorrect + '/' + acc.enterTotal + ')' : '—'}</div>
                        </div>
                        <div class="nhp-accuracy-stat">
                            <div class="acc-label">Exit Accuracy</div>
                            <div class="acc-value" style="color:#eb5757">${acc.exit !== null ? acc.exit + '% (' + acc.exitCorrect + '/' + acc.exitTotal + ')' : '—'}</div>
                        </div>
                    </div>
                    <div class="nhp-chart-label">Intensity \u03bb(t)</div>
                    <div class="nhp-intensity-chart" id="nhpIntensityChartContainer">
                        <canvas id="nhpCanvas"></canvas>
                        <div class="nhp-crosshair-tooltip" id="nhpIntensityTooltip" style="display:none;"></div>
                    </div>
                    <div class="nhp-summary-grid">
                        <div class="metric">
                            <div class="metric-label">Mean \u03bb</div>
                            <div class="metric-value">${summary.mean_intensity?.toFixed(3) || '?'}</div>
                        </div>
                        <div class="metric">
                            <div class="metric-label">Max \u03bb</div>
                            <div class="metric-value">${summary.max_intensity?.toFixed(3) || '?'}</div>
                        </div>
                        <div class="metric">
                            <div class="metric-label">Std \u03bb</div>
                            <div class="metric-value">${summary.std_intensity?.toFixed(3) || '?'}</div>
                        </div>
                        <div class="metric">
                            <div class="metric-label">Enter</div>
                            <div class="metric-value" style="color:#6fcf97">${summary.n_enter_signals ?? 0}</div>
                        </div>
                        <div class="metric">
                            <div class="metric-label">Exit</div>
                            <div class="metric-value" style="color:#eb5757">${summary.n_exit_signals ?? 0}</div>
                        </div>
                        <div class="metric">
                            <div class="metric-label">Total</div>
                            <div class="metric-value">${summary.n_total_signals ?? 0}</div>
                        </div>
                    </div>
                    ${lastSignals.length > 0 ? `
                        <div class="nhp-signals-list">
                            <div style="font-size:0.65rem;letter-spacing:0.1em;text-transform:uppercase;color:rgba(201,162,39,0.5);margin-bottom:8px;">Recent Signals (last ${lastSignals.length})</div>
                            ${signalRows}
                        </div>
                    ` : ''}
                </div>`;
        }

        // ===== NHP Chart State =====
        const nhpView = { start: 0, end: 0, data: null, minBars: 15 };

        function nhpBarAtX(mouseX, canvasEl, pad) {
            const rect = canvasEl.getBoundingClientRect();
            const x = mouseX - rect.left;
            const cW = rect.width - pad.left - pad.right;
            const frac = (x - pad.left) / cW;
            const visibleCount = nhpView.end - nhpView.start;
            const idx = nhpView.start + Math.round(frac * (visibleCount - 1));
            return Math.max(nhpView.start, Math.min(nhpView.end - 1, idx));
        }

        function redrawNhpCharts() {
            if (!nhpView.data) return;
            drawNhpPriceChart(nhpView.data);
            drawNhpIntensityChart(nhpView.data);
        }

        function drawNhpPriceChart(nhp) {
            const canvas = document.getElementById('nhpPriceCanvas');
            if (!canvas || !nhp || !nhp.ohlc) return;
            const ctx = canvas.getContext('2d');
            const dpr = window.devicePixelRatio || 1;
            const rect = canvas.getBoundingClientRect();
            canvas.width = rect.width * dpr;
            canvas.height = rect.height * dpr;
            ctx.scale(dpr, dpr);
            const W = rect.width, H = rect.height;
            const pad = { top: 20, bottom: 20, left: 60, right: 16 };
            const cW = W - pad.left - pad.right;
            const cH = H - pad.top - pad.bottom;

            const s = nhpView.start, e = nhpView.end;
            const closes = nhp.ohlc.close.slice(s, e);
            const opens = nhp.ohlc.open.slice(s, e);
            const highs = nhp.ohlc.high.slice(s, e);
            const lows = nhp.ohlc.low.slice(s, e);
            const n = closes.length;
            if (n < 2) return;

            const allMin = Math.min(...lows);
            const allMax = Math.max(...highs);
            const range = allMax - allMin || 1;
            const toY = v => pad.top + cH - ((v - allMin) / range) * cH;
            const barW = Math.max(1, Math.min(8, cW / n * 0.6));

            // Grid lines + price axis
            ctx.strokeStyle = 'rgba(201,162,39,0.08)';
            ctx.lineWidth = 0.5;
            for (let i = 0; i < 5; i++) {
                const y = pad.top + (cH / 4) * i;
                ctx.beginPath(); ctx.moveTo(pad.left, y); ctx.lineTo(W - pad.right, y); ctx.stroke();
                const price = allMax - (range / 4) * i;
                ctx.fillStyle = 'rgba(201,162,39,0.35)';
                ctx.font = '10px Inter, sans-serif';
                ctx.textAlign = 'right';
                ctx.fillText(price.toFixed(2), pad.left - 6, y + 3);
            }

            // Candles
            for (let i = 0; i < n; i++) {
                const x = pad.left + (i / (n - 1)) * cW;
                const bull = closes[i] >= opens[i];
                const color = bull ? '#6fcf97' : '#eb5757';
                ctx.strokeStyle = color;
                ctx.lineWidth = 1;
                ctx.beginPath();
                ctx.moveTo(x, toY(highs[i]));
                ctx.lineTo(x, toY(lows[i]));
                ctx.stroke();
                const bodyTop = toY(Math.max(opens[i], closes[i]));
                const bodyBot = toY(Math.min(opens[i], closes[i]));
                const bodyH = Math.max(1, bodyBot - bodyTop);
                ctx.fillStyle = bull ? 'rgba(111,207,151,0.6)' : 'rgba(235,87,87,0.6)';
                ctx.fillRect(x - barW / 2, bodyTop, barW, bodyH);
            }

            // Signal markers (only visible ones)
            (nhp.signals || []).forEach(sig => {
                if (sig.signal === 'HOLD') return;
                const idx = sig.bar_index;
                if (idx < s || idx >= e) return;
                const localIdx = idx - s;
                const x = pad.left + (localIdx / (n - 1)) * cW;
                const isEnter = sig.signal === 'ENTER';
                const color = isEnter ? '#6fcf97' : '#eb5757';
                const price = closes[localIdx];
                const y = toY(price);

                ctx.strokeStyle = color + '55';
                ctx.lineWidth = 1;
                ctx.setLineDash([3, 3]);
                ctx.beginPath(); ctx.moveTo(x, pad.top); ctx.lineTo(x, H - pad.bottom); ctx.stroke();
                ctx.setLineDash([]);

                ctx.fillStyle = color;
                ctx.beginPath();
                if (isEnter) {
                    ctx.moveTo(x, y - 8); ctx.lineTo(x - 5, y - 16); ctx.lineTo(x + 5, y - 16);
                } else {
                    ctx.moveTo(x, y + 8); ctx.lineTo(x - 5, y + 16); ctx.lineTo(x + 5, y + 16);
                }
                ctx.closePath(); ctx.fill();

                ctx.font = 'bold 9px Inter, sans-serif';
                ctx.textAlign = 'center';
                ctx.fillText(sig.signal, x, isEnter ? y - 20 : y + 24);
            });

            // Viewport indicator
            const totalBars = nhp.ohlc.close.length;
            if (e - s < totalBars) {
                const barStart = pad.left + (s / totalBars) * cW;
                const barEnd = pad.left + (e / totalBars) * cW;
                ctx.fillStyle = 'rgba(201,162,39,0.15)';
                ctx.fillRect(pad.left, H - 4, cW, 4);
                ctx.fillStyle = 'rgba(201,162,39,0.5)';
                ctx.fillRect(barStart, H - 4, barEnd - barStart, 4);
            }
        }

        function drawNhpIntensityChart(nhp) {
            const canvas = document.getElementById('nhpCanvas');
            if (!canvas || !nhp || !nhp.intensity_values) return;
            const ctx = canvas.getContext('2d');
            const dpr = window.devicePixelRatio || 1;
            const rect = canvas.getBoundingClientRect();
            canvas.width = rect.width * dpr;
            canvas.height = rect.height * dpr;
            ctx.scale(dpr, dpr);
            const W = rect.width, H = rect.height;
            const pad = { left: 60, right: 16 };

            const s = nhpView.start, e = nhpView.end;
            const vals = nhp.intensity_values.slice(s, e);
            const n = vals.length;
            if (n < 2) return;

            const maxV = Math.max(...vals) || 1;
            const minV = Math.min(...vals);
            const range = maxV - minV || 1;
            const cW = W - pad.left - pad.right;

            const grad = ctx.createLinearGradient(0, 0, 0, H);
            grad.addColorStop(0, 'rgba(201, 162, 39, 0.15)');
            grad.addColorStop(1, 'rgba(201, 162, 39, 0.01)');
            ctx.fillStyle = grad;
            ctx.beginPath();
            for (let i = 0; i < n; i++) {
                const x = pad.left + (i / (n - 1)) * cW;
                const y = H - ((vals[i] - minV) / range) * (H - 16) - 8;
                i === 0 ? ctx.moveTo(x, y) : ctx.lineTo(x, y);
            }
            ctx.lineTo(pad.left + cW, H);
            ctx.lineTo(pad.left, H);
            ctx.closePath();
            ctx.fill();

            ctx.strokeStyle = 'rgba(201, 162, 39, 0.7)';
            ctx.lineWidth = 1.5;
            ctx.beginPath();
            for (let i = 0; i < n; i++) {
                const x = pad.left + (i / (n - 1)) * cW;
                const y = H - ((vals[i] - minV) / range) * (H - 16) - 8;
                i === 0 ? ctx.moveTo(x, y) : ctx.lineTo(x, y);
            }
            ctx.stroke();

            // Y-axis labels
            ctx.fillStyle = 'rgba(201,162,39,0.35)';
            ctx.font = '10px Inter, sans-serif';
            ctx.textAlign = 'right';
            ctx.fillText(maxV.toFixed(2), pad.left - 6, 14);
            ctx.fillText(minV.toFixed(2), pad.left - 6, H - 4);

            (nhp.signals || []).forEach(sig => {
                const barIdx = sig.bar_index || 0;
                if (barIdx < s || barIdx >= e) return;
                const localIdx = barIdx - s;
                const x = pad.left + (localIdx / (n - 1)) * cW;
                const color = sig.signal === 'ENTER' ? '#6fcf97' : sig.signal === 'EXIT' ? '#eb5757' : 'rgba(201,162,39,0.3)';
                ctx.strokeStyle = color;
                ctx.lineWidth = 1;
                ctx.setLineDash([3, 3]);
                ctx.beginPath(); ctx.moveTo(x, 0); ctx.lineTo(x, H); ctx.stroke();
                ctx.setLineDash([]);
                ctx.fillStyle = color;
                ctx.font = '9px Inter, sans-serif';
                ctx.textAlign = 'center';
                ctx.fillText(sig.signal === 'HOLD' ? '' : sig.signal, x, 10);
            });
        }

        function setupNhpInteractions(nhp) {
            nhpView.data = nhp;
            nhpView.start = 0;
            nhpView.end = nhp.ohlc.close.length;

            const priceContainer = document.getElementById('nhpPriceChartContainer');
            const intensityContainer = document.getElementById('nhpIntensityChartContainer');
            const priceCanvas = document.getElementById('nhpPriceCanvas');
            const intensityCanvas = document.getElementById('nhpCanvas');
            const tooltip = document.getElementById('nhpTooltip');
            const intTooltip = document.getElementById('nhpIntensityTooltip');
            if (!priceContainer || !priceCanvas) return;

            const pricePad = { top: 20, bottom: 20, left: 60, right: 16 };
            const intPad = { left: 60, right: 16 };

            // Scroll to pan, ctrl+scroll to zoom
            function handleWheel(e) {
                e.preventDefault();
                const totalBars = nhp.ohlc.close.length;
                const visibleBars = nhpView.end - nhpView.start;

                if (e.ctrlKey || e.metaKey) {
                    // Zoom
                    const zoomAmt = Math.round(visibleBars * 0.15);
                    if (e.deltaY > 0) {
                        // Zoom out
                        nhpView.start = Math.max(0, nhpView.start - zoomAmt);
                        nhpView.end = Math.min(totalBars, nhpView.end + zoomAmt);
                    } else {
                        // Zoom in
                        if (visibleBars > nhpView.minBars) {
                            nhpView.start = Math.min(nhpView.end - nhpView.minBars, nhpView.start + zoomAmt);
                            nhpView.end = Math.max(nhpView.start + nhpView.minBars, nhpView.end - zoomAmt);
                        }
                    }
                } else {
                    // Pan
                    const panAmt = Math.max(1, Math.round(visibleBars * 0.1));
                    if (e.deltaY > 0) {
                        // Pan right (forward in time)
                        const shift = Math.min(panAmt, totalBars - nhpView.end);
                        nhpView.start += shift;
                        nhpView.end += shift;
                    } else {
                        // Pan left (back in time)
                        const shift = Math.min(panAmt, nhpView.start);
                        nhpView.start -= shift;
                        nhpView.end -= shift;
                    }
                }
                redrawNhpCharts();
            }

            priceContainer.addEventListener('wheel', handleWheel, { passive: false });
            if (intensityContainer) intensityContainer.addEventListener('wheel', handleWheel, { passive: false });

            // Crosshair on price chart
            priceCanvas.addEventListener('mousemove', (e) => {
                const barIdx = nhpBarAtX(e.clientX, priceCanvas, pricePad);
                const localIdx = barIdx - nhpView.start;
                const rect = priceCanvas.getBoundingClientRect();
                const mouseY = e.clientY - rect.top;

                // Draw crosshair on price canvas
                redrawNhpCharts();
                const ctx = priceCanvas.getContext('2d');
                const cW = rect.width - pricePad.left - pricePad.right;
                const visN = nhpView.end - nhpView.start;
                const x = pricePad.left + (localIdx / (visN - 1)) * cW;

                ctx.strokeStyle = 'rgba(201,162,39,0.4)';
                ctx.lineWidth = 0.5;
                ctx.setLineDash([4, 4]);
                ctx.beginPath(); ctx.moveTo(x, pricePad.top); ctx.lineTo(x, rect.height - pricePad.bottom); ctx.stroke();
                ctx.beginPath(); ctx.moveTo(pricePad.left, mouseY); ctx.lineTo(rect.width - pricePad.right, mouseY); ctx.stroke();
                ctx.setLineDash([]);

                // Dot on bar
                ctx.fillStyle = '#c9a227';
                ctx.beginPath(); ctx.arc(x, mouseY, 3, 0, Math.PI * 2); ctx.fill();

                // Tooltip content
                const ohlc = nhp.ohlc;
                const close = ohlc.close[barIdx];
                const open = ohlc.open[barIdx];
                const high = ohlc.high[barIdx];
                const low = ohlc.low[barIdx];
                const lambda = nhp.intensity_values[barIdx];
                const bull = close >= open;
                const sigAtBar = (nhp.signals || []).find(s => s.bar_index === barIdx && s.signal !== 'HOLD');

                let html = `<span class="tt-label">Bar</span> <span class="tt-val">${barIdx}</span><br>`;
                html += `<span class="tt-label">O</span> <span class="tt-val">${open.toFixed(2)}</span> `;
                html += `<span class="tt-label">H</span> <span class="tt-val">${high.toFixed(2)}</span><br>`;
                html += `<span class="tt-label">L</span> <span class="tt-val">${low.toFixed(2)}</span> `;
                html += `<span class="tt-label">C</span> <span class="tt-val ${bull ? 'tt-green' : 'tt-red'}">${close.toFixed(2)}</span><br>`;
                html += `<span class="tt-label">\u03bb</span> <span class="tt-val tt-gold">${lambda.toFixed(3)}</span>`;
                if (sigAtBar) {
                    const sc = sigAtBar.signal === 'ENTER' ? 'tt-green' : 'tt-red';
                    html += `<br><span class="tt-label">Signal</span> <span class="tt-val ${sc}">${sigAtBar.signal}</span>`;
                }
                tooltip.innerHTML = html;
                tooltip.style.display = 'block';

                // Position tooltip (flip if near edge)
                const mouseLocalX = e.clientX - rect.left;
                const tipW = 160;
                tooltip.style.top = Math.max(4, mouseY - 70) + 'px';
                tooltip.style.left = (mouseLocalX + tipW + 20 > rect.width ? mouseLocalX - tipW - 10 : mouseLocalX + 14) + 'px';

                // Draw matching crosshair on intensity chart
                if (intensityCanvas) {
                    const iCtx = intensityCanvas.getContext('2d');
                    const iRect = intensityCanvas.getBoundingClientRect();
                    const iCW = iRect.width - intPad.left - intPad.right;
                    const ix = intPad.left + (localIdx / (visN - 1)) * iCW;
                    iCtx.strokeStyle = 'rgba(201,162,39,0.4)';
                    iCtx.lineWidth = 0.5;
                    iCtx.setLineDash([4, 4]);
                    iCtx.beginPath(); iCtx.moveTo(ix, 0); iCtx.lineTo(ix, iRect.height); iCtx.stroke();
                    iCtx.setLineDash([]);
                    iCtx.fillStyle = '#c9a227';
                    const iVals = nhp.intensity_values.slice(nhpView.start, nhpView.end);
                    const iMin = Math.min(...iVals), iMax = Math.max(...iVals), iRange = iMax - iMin || 1;
                    const iy = iRect.height - ((lambda - iMin) / iRange) * (iRect.height - 16) - 8;
                    iCtx.beginPath(); iCtx.arc(ix, iy, 3, 0, Math.PI * 2); iCtx.fill();
                }
            });

            priceCanvas.addEventListener('mouseleave', () => {
                tooltip.style.display = 'none';
                if (intTooltip) intTooltip.style.display = 'none';
                redrawNhpCharts();
            });

            // Crosshair on intensity chart
            if (intensityCanvas) {
                intensityCanvas.addEventListener('mousemove', (e) => {
                    const barIdx = nhpBarAtX(e.clientX, intensityCanvas, intPad);
                    const localIdx = barIdx - nhpView.start;
                    const rect = intensityCanvas.getBoundingClientRect();
                    const mouseY = e.clientY - rect.top;

                    redrawNhpCharts();
                    const ctx = intensityCanvas.getContext('2d');
                    const cW = rect.width - intPad.left - intPad.right;
                    const visN = nhpView.end - nhpView.start;
                    const x = intPad.left + (localIdx / (visN - 1)) * cW;

                    ctx.strokeStyle = 'rgba(201,162,39,0.4)';
                    ctx.lineWidth = 0.5;
                    ctx.setLineDash([4, 4]);
                    ctx.beginPath(); ctx.moveTo(x, 0); ctx.lineTo(x, rect.height); ctx.stroke();
                    ctx.beginPath(); ctx.moveTo(intPad.left, mouseY); ctx.lineTo(rect.width - intPad.right, mouseY); ctx.stroke();
                    ctx.setLineDash([]);

                    const lambda = nhp.intensity_values[barIdx];
                    if (intTooltip) {
                        intTooltip.innerHTML = `<span class="tt-label">Bar</span> <span class="tt-val">${barIdx}</span> &nbsp; <span class="tt-label">\u03bb</span> <span class="tt-val tt-gold">${lambda.toFixed(3)}</span>`;
                        intTooltip.style.display = 'block';
                        const mouseLocalX = e.clientX - rect.left;
                        intTooltip.style.top = Math.max(4, mouseY - 20) + 'px';
                        intTooltip.style.left = (mouseLocalX + 140 > rect.width ? mouseLocalX - 140 : mouseLocalX + 14) + 'px';
                    }

                    // Sync crosshair on price chart
                    if (priceCanvas) {
                        const pCtx = priceCanvas.getContext('2d');
                        const pRect = priceCanvas.getBoundingClientRect();
                        const pCW = pRect.width - pricePad.left - pricePad.right;
                        const px = pricePad.left + (localIdx / (visN - 1)) * pCW;
                        pCtx.strokeStyle = 'rgba(201,162,39,0.4)';
                        pCtx.lineWidth = 0.5;
                        pCtx.setLineDash([4, 4]);
                        pCtx.beginPath(); pCtx.moveTo(px, pricePad.top); pCtx.lineTo(px, pRect.height - pricePad.bottom); pCtx.stroke();
                        pCtx.setLineDash([]);
                    }
                });

                intensityCanvas.addEventListener('mouseleave', () => {
                    if (intTooltip) intTooltip.style.display = 'none';
                    tooltip.style.display = 'none';
                    redrawNhpCharts();
                });
            }
        }

        // ===== Retry wrapper for Render cold starts =====
        async function fetchWithRetry(url, options = {}, retries = 4, delay = 5000) {
            for (let i = 0; i < retries; i++) {
                try {
                    const controller = new AbortController();
                    const timeout = setTimeout(() => controller.abort(), 90000);
                    const resp = await fetch(url, { ...options, signal: controller.signal });
                    clearTimeout(timeout);
                    if (resp.ok || resp.status < 500) return resp;
                    if (i < retries - 1) await new Promise(r => setTimeout(r, delay));
                } catch (err) {
                    if (i === retries - 1) throw err;
                    await new Promise(r => setTimeout(r, delay));
                }
            }
        }

        // ===== Login =====
        const API_BASE = 'https://fartpie.onrender.com';
        const loginOverlay = document.getElementById('loginOverlay');
        const loginBtn = document.getElementById('loginBtn');
        const loginError = document.getElementById('loginError');

        loginBtn.addEventListener('click', doLogin);
        document.getElementById('login-password').addEventListener('keydown', (e) => {
            if (e.key === 'Enter') doLogin();
        });

        async function doLogin() {
            const username = document.getElementById('login-username').value.trim();
            const password = document.getElementById('login-password').value.trim();
            if (!username || !password) {
                loginError.textContent = 'Please enter username and password';
                return;
            }
            loginBtn.disabled = true;
            loginError.textContent = 'Connecting...';
            try {
                const resp = await fetchWithRetry(`${API_BASE}/api/login`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    credentials: 'include',
                    body: JSON.stringify({ username, password })
                });
                const data = await resp.json();
                if (data.success) {
                    loginOverlay.classList.add('hidden');
                } else {
                    loginError.textContent = data.message || 'Invalid credentials';
                }
            } catch (err) {
                loginError.textContent = 'Connection failed — server may be starting up, try again';
            } finally {
                loginBtn.disabled = false;
            }
        }

        // ===== NHP Independent Fetch =====
        let nhpTimeframe = '1d';
        let currentTicker = 'SPY';
        let nhpLoaded = false;

        async function fetchAndRenderNhp() {
            const heroLeft = document.getElementById('heroLeft');
            heroLeft.innerHTML = `
                <div class="nhp-section" style="text-align:center;padding:40px;">
                    <div class="spinner" style="margin:0 auto 12px;"></div>
                    <div style="color:rgba(201,162,39,0.5);font-size:0.75rem;letter-spacing:0.1em;text-transform:uppercase;">Loading NHP ${nhpTimeframe}...</div>
                </div>`;
            try {
                const nhpResp = await fetchWithRetry(`${API_BASE}/api/nhp-signals?ticker=${encodeURIComponent(currentTicker)}&timeframe=${encodeURIComponent(nhpTimeframe)}`, {
                    credentials: 'include'
                });
                if (nhpResp && nhpResp.ok) {
                    const nhpData = await nhpResp.json();
                    if (nhpData.success) {
                        heroLeft.innerHTML = renderNhpSection(nhpData, nhpTimeframe);
                        requestAnimationFrame(() => {
                            nhpView.start = 0;
                            nhpView.end = nhpData.ohlc ? nhpData.ohlc.close.length : (nhpData.intensity_values ? nhpData.intensity_values.length : 0);
                            nhpView.data = nhpData;
                            drawNhpPriceChart(nhpData);
                            drawNhpIntensityChart(nhpData);
                            setupNhpInteractions(nhpData);
                        });
                        // Attach timeframe change listener
                        const sel = document.getElementById('nhpTimeframeSelect');
                        if (sel) {
                            sel.addEventListener('change', (e) => {
                                nhpTimeframe = e.target.value;
                                fetchAndRenderNhp();
                            });
                        }
                        nhpLoaded = true;
                    }
                }
            } catch (nhpErr) {
                console.warn('NHP fetch failed:', nhpErr);
                heroLeft.innerHTML = `
                    <div class="nhp-section" style="text-align:center;padding:40px;">
                        <div style="color:#eb5757;font-size:0.85rem;">NHP load failed — server may be waking up</div>
                        <div style="color:rgba(201,162,39,0.4);font-size:0.7rem;margin-top:8px;cursor:pointer;text-decoration:underline;" onclick="fetchAndRenderNhp()">Retry</div>
                    </div>`;
            }
        }

        // ===== Forecast =====
        const forecast = new LSTMForecast();
        const container = document.getElementById('forecastContainer');
        const btn = document.getElementById('getForecast');

        btn.addEventListener('click', async () => {
            const ticker = document.getElementById('ticker').value.trim();
            const timeframe = document.getElementById('timeframe').value;
            const lookback = 20;

            if (!ticker) {
                alert('Please enter a ticker symbol');
                return;
            }

            currentTicker = ticker;

            btn.disabled = true;
            container.innerHTML = `
                <div class="loading">
                    <div class="spinner"></div>
                    <p>Analyzing... this may take up to a minute if the server is waking up</p>
                </div>
            `;

            try {
                forecast.apiBaseUrl = API_BASE;
                const data = await forecast.getForecast(ticker, timeframe, lookback);
                const formatted = forecast.formatForecast(data);
                forecast.renderForecast(formatted, container);

                // Fetch NHP independently with its own timeframe
                fetchAndRenderNhp();
            } catch (error) {
                container.innerHTML = `
                    <div class="lstm-forecast-error">
                        <h3>Error</h3>
                        <p>${error.message}</p>
                        <p class="suggestion">The server may be waking up — try again in a few seconds.</p>
                    </div>
                `;
            } finally {
                btn.disabled = false;
            }
        });
        // ===== Tab Switching =====
        const navLinks = document.querySelectorAll('.nav-links a[data-tab]');
        const forecastPanel = document.querySelector('.forecast-panel:not(.backtest-panel)');
        const backtestPanel = document.getElementById('backtestPanel');

        navLinks.forEach(link => {
            link.addEventListener('click', (e) => {
                e.preventDefault();
                navLinks.forEach(l => l.classList.remove('active'));
                link.classList.add('active');
                const tab = link.dataset.tab;
                if (tab === 'backtest') {
                    forecastPanel.style.display = 'none';
                    backtestPanel.style.display = 'block';
                } else {
                    forecastPanel.style.display = 'block';
                    backtestPanel.style.display = 'none';
                }
            });
        });

        // ===== Backtest Engine =====
        const BT_COLORS = {
            green: '#22c55e', red: '#ef4444', amber: '#f59e0b',
            blue: '#3b82f6', purple: '#8b5cf6', teal: '#14b8a6'
        };

        function simulateTrades(data, levels, splitIdx, slPct, tpPct) {
            const trades = [];
            const tolerance = 0.003; // 0.3% zone around level

            for (const level of levels) {
                const price = level.price;
                const slDist = price * (slPct / 100);
                const tpDist = price * (tpPct / 100);
                let cooldown = 0;

                for (let i = splitIdx; i < data.length; i++) {
                    if (cooldown > 0) { cooldown--; continue; }
                    const bar = data[i];

                    // Price touches the level (low reaches within tolerance)
                    if (bar.low <= price * (1 + tolerance) && bar.low >= price * (1 - tolerance * 3)) {
                        const entryPrice = price;
                        const slPrice = entryPrice - slDist;
                        const tpPrice = entryPrice + tpDist;
                        let result = null;
                        let exitIdx = i;
                        let exitPrice = entryPrice;

                        for (let j = i + 1; j < data.length; j++) {
                            if (data[j].low <= slPrice) {
                                result = 'loss';
                                exitIdx = j;
                                exitPrice = slPrice;
                                break;
                            }
                            if (data[j].high >= tpPrice) {
                                result = 'win';
                                exitIdx = j;
                                exitPrice = tpPrice;
                                break;
                            }
                        }

                        if (result) {
                            trades.push({
                                level: price,
                                entryIdx: i,
                                entryDate: bar.date,
                                exitIdx,
                                exitDate: data[exitIdx].date,
                                entryPrice,
                                exitPrice,
                                result,
                                pnlPct: ((exitPrice - entryPrice) / entryPrice * 100),
                                barsHeld: exitIdx - i
                            });
                        }
                        cooldown = 3; // skip next 3 bars to avoid repeat entries
                    }
                }
            }
            return trades;
        }

        function renderBacktestResults(data, levels, trades, splitIdx, method, slPct, tpPct) {
            const container = document.getElementById('backtestContainer');
            const interval = document.getElementById('bt-interval').value;
            const tfLabels = {'5m':'5min','15m':'15min','1h':'1H','4h':'4H','1d':'Daily','1wk':'Weekly'};
            const tfLabel = tfLabels[interval] || interval;
            const methodLabels = {
                hdbscan:'HDBSCAN', optics:'OPTICS', kde:'KDE', multiscale:'Multiscale HDBSCAN',
                neural_network:'Neural Network', wyckoff:'Wyckoff', ml_confluence:'ML Confluence',
                interaction:'Interaction', pivot:'Pivots', gap:'Gaps'
            };

            const wins = trades.filter(t => t.result === 'win');
            const losses = trades.filter(t => t.result === 'loss');
            const winRate = trades.length > 0 ? wins.length / trades.length : 0;
            const avgWin = wins.length > 0 ? wins.reduce((s, t) => s + t.pnlPct, 0) / wins.length : 0;
            const avgLoss = losses.length > 0 ? losses.reduce((s, t) => s + t.pnlPct, 0) / losses.length : 0;
            const totalPnl = trades.reduce((s, t) => s + t.pnlPct, 0);
            const expectancy = trades.length > 0 ? totalPnl / trades.length : 0;
            const avgBars = trades.length > 0 ? trades.reduce((s, t) => s + t.barsHeld, 0) / trades.length : 0;
            const profitFactor = Math.abs(avgLoss) > 0 ? (wins.length * avgWin) / (losses.length * Math.abs(avgLoss)) : wins.length > 0 ? Infinity : 0;

            // Per-level breakdown
            const byLevel = {};
            for (const lv of levels) {
                byLevel[lv.price] = { price: lv.price, type: lv.type, trades: [], wins: 0, losses: 0 };
            }
            for (const t of trades) {
                if (byLevel[t.level]) {
                    byLevel[t.level].trades.push(t);
                    if (t.result === 'win') byLevel[t.level].wins++;
                    else byLevel[t.level].losses++;
                }
            }

            let html = `
                <div class="bt-controls">
                    <div class="bt-control">
                        <div class="bt-control-header">
                            <span class="bt-control-label">Method</span>
                            <span class="bt-control-value">${methodLabels[method] || method}</span>
                        </div>
                    </div>
                    <div class="bt-control">
                        <div class="bt-control-header">
                            <span class="bt-control-label">Levels found</span>
                            <span class="bt-control-value">${levels.length}</span>
                        </div>
                    </div>
                    <div class="bt-control">
                        <div class="bt-control-header">
                            <span class="bt-control-label">SL / TP</span>
                            <span class="bt-control-value">${slPct}% / ${tpPct}%</span>
                        </div>
                    </div>
                    <div class="bt-control">
                        <div class="bt-control-header">
                            <span class="bt-control-label">Train / Test</span>
                            <span class="bt-control-value">${splitIdx} / ${data.length - splitIdx} bars</span>
                        </div>
                    </div>
                </div>`;

            // Aggregate stats
            const wrColor = winRate >= 0.55 ? BT_COLORS.green : winRate >= 0.4 ? BT_COLORS.amber : BT_COLORS.red;
            const pfColor = profitFactor >= 1.5 ? BT_COLORS.green : profitFactor >= 1 ? BT_COLORS.amber : BT_COLORS.red;
            const expColor = expectancy > 0 ? BT_COLORS.green : BT_COLORS.red;

            html += `
                <div class="bt-detail">
                    <div class="bt-detail-header">
                        <span class="bt-detail-price">${methodLabels[method] || method}</span>
                        <span class="bt-badge" style="border:1px solid ${wrColor};color:${wrColor}">${(winRate * 100).toFixed(1)}% WIN RATE</span>
                        <span class="bt-badge" style="border:1px solid ${BT_COLORS.blue};color:${BT_COLORS.blue}">${trades.length} TRADES</span>
                        <span class="bt-detail-meta">out-of-sample on ${data.length - splitIdx} bars &middot; ${tfLabel}</span>
                    </div>
                    <div class="bt-detail-body">
                        <div class="bt-detail-left">
                            <div class="bt-section-label">TRADE RESULTS</div>
                            <div class="bt-stat-row">
                                <span class="bt-stat-label">Total trades</span>
                                <span class="bt-stat-value">${trades.length}</span>
                            </div>
                            <div class="bt-stat-row">
                                <span class="bt-stat-label">Wins</span>
                                <span class="bt-stat-value" style="color:${BT_COLORS.green}">${wins.length}</span>
                            </div>
                            <div class="bt-stat-row">
                                <span class="bt-stat-label">Losses</span>
                                <span class="bt-stat-value" style="color:${BT_COLORS.red}">${losses.length}</span>
                            </div>
                            <div class="bt-stat-row">
                                <span class="bt-stat-label">Win rate</span>
                                <span class="bt-stat-value" style="color:${wrColor}">${(winRate * 100).toFixed(1)}%</span>
                            </div>
                            <div class="bt-stat-row">
                                <span class="bt-stat-label">Avg win</span>
                                <span class="bt-stat-value" style="color:${BT_COLORS.green}">+${avgWin.toFixed(2)}%</span>
                            </div>
                            <div class="bt-stat-row">
                                <span class="bt-stat-label">Avg loss</span>
                                <span class="bt-stat-value" style="color:${BT_COLORS.red}">${avgLoss.toFixed(2)}%</span>
                            </div>
                            <div class="bt-stat-row">
                                <span class="bt-stat-label">Expectancy</span>
                                <span class="bt-stat-value" style="color:${expColor}">${expectancy >= 0 ? '+' : ''}${expectancy.toFixed(2)}%<span class="bt-stat-sub">per trade</span></span>
                            </div>
                            <div class="bt-stat-row">
                                <span class="bt-stat-label">Profit factor</span>
                                <span class="bt-stat-value" style="color:${pfColor}">${profitFactor === Infinity ? '∞' : profitFactor.toFixed(2)}</span>
                            </div>
                            <div class="bt-stat-row">
                                <span class="bt-stat-label">Total P&L</span>
                                <span class="bt-stat-value" style="color:${totalPnl >= 0 ? BT_COLORS.green : BT_COLORS.red}">${totalPnl >= 0 ? '+' : ''}${totalPnl.toFixed(2)}%</span>
                            </div>
                            <div class="bt-stat-row">
                                <span class="bt-stat-label">Avg bars held</span>
                                <span class="bt-stat-value">${avgBars.toFixed(1)}</span>
                            </div>
                        </div>
                        <div class="bt-detail-right">
                            <div class="bt-section-label">PER-LEVEL BREAKDOWN</div>
                            ${Object.values(byLevel).map(lv => {
                                const lvTotal = lv.trades.length;
                                const lvWr = lvTotal > 0 ? lv.wins / lvTotal : 0;
                                const lvColor = lvWr >= 0.55 ? BT_COLORS.green : lvWr >= 0.4 ? BT_COLORS.amber : BT_COLORS.red;
                                return `
                                    <div style="margin-bottom:8px;padding:8px;background:rgba(255,255,255,0.02);border-radius:3px">
                                        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:4px">
                                            <span style="font-weight:500;font-size:13px">$${lv.price.toFixed(2)}</span>
                                            <span style="font-size:11px;color:rgba(255,255,255,0.4)">${lv.type || ''}</span>
                                        </div>
                                        <div style="display:flex;gap:12px;font-size:11px">
                                            <span>${lvTotal} trade${lvTotal !== 1 ? 's' : ''}</span>
                                            <span style="color:${BT_COLORS.green}">${lv.wins}W</span>
                                            <span style="color:${BT_COLORS.red}">${lv.losses}L</span>
                                            <span style="color:${lvColor}">${(lvWr * 100).toFixed(0)}%</span>
                                        </div>
                                        <div class="bt-score-bar" style="margin-top:4px"><div class="bt-score-fill" style="width:${lvWr * 100}%;background:${lvColor}"></div></div>
                                    </div>`;
                            }).join('')}
                            <div style="margin-top:16px">
                                <div class="bt-section-label">DATA INTEGRITY</div>
                                <div class="bt-interp">
                                    Levels detected on first ${splitIdx} bars (training). Trades simulated on last ${data.length - splitIdx} bars (test). No data leakage — levels never see test data.
                                </div>
                            </div>
                        </div>
                    </div>
                </div>`;

            // Trade log
            if (trades.length > 0) {
                html += `<div style="margin-top:16px"><div class="bt-section-label" style="padding:0 4px;margin-bottom:8px">TRADE LOG (last 20)</div>`;
                html += `<div style="overflow-x:auto"><table style="width:100%;font-size:11px;border-collapse:collapse">
                    <tr style="color:rgba(255,255,255,0.4);text-align:left">
                        <th style="padding:4px 8px">Level</th><th style="padding:4px 8px">Entry</th><th style="padding:4px 8px">Exit</th>
                        <th style="padding:4px 8px">Result</th><th style="padding:4px 8px">P&L</th><th style="padding:4px 8px">Bars</th>
                    </tr>`;
                trades.slice(-20).forEach(t => {
                    const rc = t.result === 'win' ? BT_COLORS.green : BT_COLORS.red;
                    html += `<tr style="border-top:1px solid rgba(255,255,255,0.04)">
                        <td style="padding:4px 8px">$${t.level.toFixed(2)}</td>
                        <td style="padding:4px 8px">${t.entryDate}</td>
                        <td style="padding:4px 8px">${t.exitDate}</td>
                        <td style="padding:4px 8px;color:${rc}">${t.result.toUpperCase()}</td>
                        <td style="padding:4px 8px;color:${rc}">${t.pnlPct >= 0 ? '+' : ''}${t.pnlPct.toFixed(2)}%</td>
                        <td style="padding:4px 8px">${t.barsHeld}</td>
                    </tr>`;
                });
                html += `</table></div></div>`;
            }

            html += `<div class="bt-footer">yfinance OHLCV &middot; ${data.length} bars &middot; ${tfLabel} &middot; ${methodLabels[method] || method} &middot; ${splitIdx}/${data.length - splitIdx} train/test split &middot; no data leakage</div>`;
            container.innerHTML = html;
        }

        // Backtest button handler
        document.getElementById('runBacktest').addEventListener('click', async () => {
            const ticker = document.getElementById('bt-ticker').value.trim();
            const period = document.getElementById('bt-period').value;
            const interval = document.getElementById('bt-interval').value;
            const method = document.getElementById('bt-method').value;
            const slPct = parseFloat(document.getElementById('bt-sl').value) || 1;
            const tpPct = parseFloat(document.getElementById('bt-tp').value) || 2;
            const btBtn = document.getElementById('runBacktest');
            const btContainer = document.getElementById('backtestContainer');

            if (!ticker) { alert('Please enter a ticker symbol'); return; }

            btBtn.disabled = true;
            btContainer.innerHTML = `<div class="loading"><div class="spinner"></div><p>Running ${method} on ${ticker} ${interval} data...</p></div>`;

            try {
                const url = new URL('https://fartpie.onrender.com/api/backtest-levels');
                url.searchParams.set('ticker', ticker);
                url.searchParams.set('period', period);
                url.searchParams.set('interval', interval);
                url.searchParams.set('method', method);

                const response = await fetch(url.toString());
                if (!response.ok) {
                    const err = await response.json();
                    throw new Error(err.error || `HTTP ${response.status}`);
                }

                const result = await response.json();
                const data = result.data;
                const levels = result.levels;
                const splitIdx = result.split_idx;

                if (!levels || levels.length === 0) {
                    btContainer.innerHTML = `<div style="text-align:center;padding:40px;color:rgba(255,255,255,0.5);">No levels detected by ${method} on the training data. Try a different method or longer period.</div>`;
                    return;
                }

                const trades = simulateTrades(data, levels, splitIdx, slPct, tpPct);
                renderBacktestResults(data, levels, trades, splitIdx, method, slPct, tpPct);
            } catch (error) {
                btContainer.innerHTML = `<div class="lstm-forecast-error"><h3>Error</h3><p>${error.message}</p></div>`;
            } finally {
                btBtn.disabled = false;
            }
        });
    </script>
</body>
</html>
