<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LSTM Forecast - Advanced Price Prediction</title>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;0,700;1,300;1,400&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            min-height: 100vh;
            background: #0a0e1a;
            color: #e8e6e3;
            overflow-x: hidden;
        }

        /* Navigation */
        .nav {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            z-index: 100;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 24px 48px;
            background: rgba(10, 14, 26, 0.9);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-bottom: 1px solid rgba(201, 162, 39, 0.12);
        }

        .nav-brand {
            font-family: 'Cormorant Garamond', Georgia, serif;
            font-size: 1.4rem;
            font-weight: 400;
            letter-spacing: 0.15em;
            text-transform: uppercase;
            color: #c9a227;
        }

        .nav-links {
            display: flex;
            gap: 40px;
            list-style: none;
        }

        .nav-links a {
            font-size: 0.75rem;
            font-weight: 400;
            letter-spacing: 0.12em;
            text-transform: uppercase;
            color: rgba(201, 162, 39, 0.5);
            text-decoration: none;
            transition: color 0.3s ease;
        }

        .nav-links a:hover,
        .nav-links a.active {
            color: #c9a227;
        }

        /* Hero Section */
        .hero {
            position: relative;
            min-height: 100vh;
            display: flex;
            align-items: center;
            padding: 120px 48px 80px;
        }

        .hero-bg {
            position: absolute;
            inset: 0;
            background: radial-gradient(ellipse at 70% 50%, rgba(10, 14, 26, 0.5) 0%, transparent 70%);
            pointer-events: none;
        }

        .hero-content {
            position: relative;
            z-index: 2;
            width: 100%;
            max-width: 1400px;
            margin: 0 auto;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 80px;
            align-items: start;
        }

        .hero-text {
            width: 100%;
        }

        .hero-label {
            font-size: 0.7rem;
            font-weight: 500;
            letter-spacing: 0.2em;
            text-transform: uppercase;
            color: rgba(255, 255, 255, 0.35);
            margin-bottom: 24px;
        }

        .hero-title {
            font-family: 'Cormorant Garamond', Georgia, serif;
            font-size: 4.5rem;
            font-weight: 300;
            line-height: 1.1;
            color: #ffffff;
            margin-bottom: 32px;
            letter-spacing: -0.01em;
        }

        .hero-title em {
            font-style: italic;
            font-weight: 300;
        }

        .hero-desc {
            font-family: 'Cormorant Garamond', serif;
            font-size: 1.6em;
            font-weight: 300;
            font-style: italic;
            color: rgba(232, 230, 227, 0.45);
            letter-spacing: 0.04em;
            margin-bottom: 48px;
            max-width: 420px;
        }

        /* Forecast Panel */
        .forecast-panel {
            background: rgba(201, 162, 39, 0.03);
            border: 1px solid rgba(201, 162, 39, 0.15);
            border-radius: 2px;
            padding: 48px;
            animation: fadeIn 1s ease-out 0.3s both;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .panel-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 40px;
            padding-bottom: 20px;
            border-bottom: 1px solid rgba(201, 162, 39, 0.12);
        }

        .panel-title {
            font-family: 'Cormorant Garamond', Georgia, serif;
            font-size: 1.5rem;
            font-weight: 400;
            color: #ffffff;
            letter-spacing: 0.02em;
        }

        .panel-badge {
            font-size: 0.65rem;
            font-weight: 500;
            letter-spacing: 0.15em;
            text-transform: uppercase;
            color: rgba(201, 162, 39, 0.5);
            border: 1px solid rgba(201, 162, 39, 0.2);
            padding: 6px 14px;
            border-radius: 1px;
        }

        /* Form Controls */
        .controls {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 32px;
        }

        .control-group {
            display: flex;
            flex-direction: column;
        }

        .control-group.full-width {
            grid-column: 1 / -1;
        }

        .control-group label {
            font-size: 0.65rem;
            font-weight: 500;
            letter-spacing: 0.15em;
            text-transform: uppercase;
            color: rgba(201, 162, 39, 0.5);
            margin-bottom: 10px;
        }

        .control-group input,
        .control-group select {
            width: 100%;
            padding: 14px 16px;
            background: rgba(201, 162, 39, 0.04);
            border: 1px solid rgba(201, 162, 39, 0.15);
            border-radius: 1px;
            color: #ffffff;
            font-family: 'Inter', sans-serif;
            font-size: 0.85rem;
            font-weight: 300;
            letter-spacing: 0.02em;
            transition: all 0.3s ease;
        }

        .control-group input::placeholder {
            color: rgba(255, 255, 255, 0.2);
        }

        .control-group select option {
            background: #0a0e1a;
            color: #ffffff;
        }

        .control-group input:focus,
        .control-group select:focus {
            outline: none;
            border-color: rgba(201, 162, 39, 0.4);
        }

        .btn {
            width: 100%;
            padding: 16px 32px;
            background: transparent;
            border: 1px solid rgba(201, 162, 39, 0.3);
            color: #c9a227;
            font-family: 'Inter', sans-serif;
            font-size: 0.7rem;
            font-weight: 500;
            letter-spacing: 0.2em;
            text-transform: uppercase;
            cursor: pointer;
            transition: all 0.4s ease;
            border-radius: 1px;
        }

        .btn:hover {
            background: rgba(201, 162, 39, 0.08);
            border-color: rgba(201, 162, 39, 0.5);
        }

        .btn:disabled {
            opacity: 0.3;
            cursor: not-allowed;
        }

        /* Loading */
        .loading {
            text-align: center;
            padding: 60px 20px;
            color: rgba(255, 255, 255, 0.4);
        }

        .spinner {
            width: 32px;
            height: 32px;
            border: 1px solid rgba(201, 162, 39, 0.15);
            border-top: 1px solid rgba(201, 162, 39, 0.6);
            border-radius: 50%;
            animation: spin 1.2s linear infinite;
            margin: 0 auto 24px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .loading p {
            font-size: 0.75rem;
            font-weight: 400;
            letter-spacing: 0.1em;
            text-transform: uppercase;
        }

        /* Decorative Line */
        .divider {
            width: 60px;
            height: 1px;
            background: rgba(201, 162, 39, 0.3);
            margin: 0 auto 48px;
        }

        /* Backtest Styles */
        .bt-controls {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
            gap: 12px;
            margin-bottom: 24px;
        }

        .bt-control {
            background: rgba(201, 162, 39, 0.04);
            border-radius: 4px;
            padding: 10px 12px;
        }

        .bt-control-header {
            display: flex;
            justify-content: space-between;
            margin-bottom: 6px;
        }

        .bt-control-label {
            font-size: 0.65rem;
            color: rgba(255, 255, 255, 0.4);
            letter-spacing: 0.05em;
            text-transform: uppercase;
        }

        .bt-control-value {
            font-size: 0.7rem;
            font-weight: 500;
            color: #e8e6e3;
        }

        .bt-slider {
            width: 100%;
            -webkit-appearance: none;
            appearance: none;
            height: 4px;
            border-radius: 2px;
            background: rgba(201, 162, 39, 0.12);
            outline: none;
        }

        .bt-slider::-webkit-slider-thumb {
            -webkit-appearance: none;
            appearance: none;
            width: 14px;
            height: 14px;
            border-radius: 50%;
            background: #ffffff;
            cursor: pointer;
        }

        .bt-level-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
            gap: 8px;
            margin-bottom: 24px;
        }

        .bt-level-card {
            background: rgba(201, 162, 39, 0.03);
            border: 1px solid rgba(201, 162, 39, 0.12);
            border-radius: 4px;
            padding: 10px 12px;
            cursor: pointer;
            transition: all 0.15s;
        }

        .bt-level-card:hover {
            border-color: rgba(201, 162, 39, 0.3);
        }

        .bt-level-card.selected {
            background: rgba(201, 162, 39, 0.05);
        }

        .bt-level-price {
            font-size: 0.85rem;
            font-weight: 500;
            color: #ffffff;
        }

        .bt-level-score {
            font-size: 0.75rem;
            font-weight: 500;
        }

        .bt-level-meta {
            font-size: 0.65rem;
            color: rgba(255, 255, 255, 0.4);
            margin: 4px 0;
        }

        .bt-score-bar {
            height: 3px;
            background: rgba(201, 162, 39, 0.08);
            border-radius: 2px;
            overflow: hidden;
        }

        .bt-score-fill {
            height: 100%;
            border-radius: 2px;
            transition: width 0.3s;
        }

        .bt-detail {
            border: 1px solid rgba(201, 162, 39, 0.15);
            border-radius: 4px;
            overflow: hidden;
        }

        .bt-detail-header {
            padding: 14px 18px;
            border-bottom: 1px solid rgba(201, 162, 39, 0.12);
            display: flex;
            align-items: center;
            gap: 12px;
            flex-wrap: wrap;
        }

        .bt-detail-price {
            font-size: 1.2rem;
            font-weight: 500;
            color: #ffffff;
        }

        .bt-badge {
            font-size: 0.55rem;
            font-weight: 500;
            letter-spacing: 0.05em;
            padding: 2px 6px;
            border-radius: 3px;
            text-transform: uppercase;
        }

        .bt-detail-meta {
            font-size: 0.7rem;
            color: rgba(255, 255, 255, 0.4);
            margin-left: auto;
        }

        .bt-detail-body {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 0;
        }

        .bt-detail-left {
            padding: 18px;
            border-right: 1px solid rgba(201, 162, 39, 0.12);
        }

        .bt-detail-right {
            padding: 18px;
        }

        .bt-section-label {
            font-size: 0.6rem;
            color: rgba(255, 255, 255, 0.35);
            letter-spacing: 0.08em;
            text-transform: uppercase;
            margin-bottom: 10px;
        }

        .bt-stat-row {
            display: flex;
            justify-content: space-between;
            align-items: baseline;
            padding: 5px 0;
            border-bottom: 1px solid rgba(201, 162, 39, 0.08);
        }

        .bt-stat-label {
            font-size: 0.7rem;
            color: rgba(255, 255, 255, 0.4);
        }

        .bt-stat-value {
            font-size: 0.8rem;
            font-weight: 500;
        }

        .bt-stat-sub {
            font-size: 0.6rem;
            color: rgba(255, 255, 255, 0.25);
            margin-left: 4px;
        }

        .bt-gauges {
            display: flex;
            justify-content: space-around;
            margin-bottom: 20px;
        }

        .bt-gauge-label {
            font-size: 0.6rem;
            color: rgba(255, 255, 255, 0.4);
            text-align: center;
            max-width: 70px;
        }

        .bt-regime-row {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 6px;
        }

        .bt-regime-label {
            width: 52px;
            font-size: 0.65rem;
            color: rgba(255, 255, 255, 0.4);
            text-align: right;
        }

        .bt-regime-bar {
            flex: 1;
            height: 8px;
            background: rgba(201, 162, 39, 0.08);
            border-radius: 4px;
            overflow: hidden;
        }

        .bt-regime-fill {
            height: 100%;
            border-radius: 4px;
            transition: width 0.6s ease;
        }

        .bt-regime-pct {
            width: 36px;
            font-size: 0.65rem;
            color: #e8e6e3;
            text-align: right;
        }

        .bt-regime-count {
            width: 28px;
            font-size: 0.65rem;
            color: rgba(255, 255, 255, 0.4);
        }

        .bt-interp {
            font-size: 0.7rem;
            line-height: 1.6;
            color: rgba(255, 255, 255, 0.4);
        }

        .bt-footer {
            margin-top: 12px;
            font-size: 0.65rem;
            color: rgba(255, 255, 255, 0.2);
            text-align: right;
        }

        @media (max-width: 768px) {
            .bt-detail-body {
                grid-template-columns: 1fr;
            }
            .bt-detail-left {
                border-right: none;
                border-bottom: 1px solid rgba(201, 162, 39, 0.12);
            }
        }

        /* Responsive */
        @media (max-width: 1024px) {
            .hero-content {
                grid-template-columns: 1fr;
                gap: 48px;
            }

            .hero-title {
                font-size: 3rem;
            }

            .nav {
                padding: 20px 24px;
            }

            .hero {
                padding: 120px 24px 60px;
            }
        }

        @media (max-width: 640px) {
            .hero-title {
                font-size: 2.2rem;
            }

            .controls {
                grid-template-columns: 1fr;
            }

            .nav-links {
                display: none;
            }

            .forecast-panel {
                padding: 32px 24px;
            }
        }

        /* NHP Section (left side, fills entire area) */
        .nhp-section {
            padding: 24px;
            background: rgba(201, 162, 39, 0.03);
            border: 1px solid rgba(201, 162, 39, 0.15);
            border-radius: 2px;
            width: 100%;
        }
        .nhp-section-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            padding-bottom: 14px;
            border-bottom: 1px solid rgba(201, 162, 39, 0.12);
        }
        .nhp-section-title {
            font-family: 'Cormorant Garamond', serif;
            font-size: 1.5rem;
            color: #fff;
        }
        .nhp-status-badge {
            font-size: 0.65rem;
            letter-spacing: 0.12em;
            text-transform: uppercase;
            padding: 4px 10px;
            margin-left: 12px;
        }
        .nhp-bars-label {
            font-size: 0.65rem;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            color: rgba(201, 162, 39, 0.5);
        }
        /* NHP Timeframe Selector */
        .nhp-tf-selector {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 18px;
        }
        .nhp-tf-selector label {
            font-size: 0.7rem;
            font-weight: 500;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            color: rgba(201, 162, 39, 0.6);
        }
        .nhp-tf-selector select {
            background: rgba(201, 162, 39, 0.08);
            border: 1px solid rgba(201, 162, 39, 0.25);
            color: #c9a227;
            padding: 6px 12px;
            border-radius: 2px;
            font-size: 0.8rem;
            font-family: 'Inter', sans-serif;
            cursor: pointer;
            outline: none;
        }
        .nhp-tf-selector select:focus {
            border-color: #c9a227;
        }
        .nhp-tf-selector select option {
            background: #0a0e1a;
            color: #e8e6e3;
        }
        /* Price chart with signal overlays */
        .nhp-price-chart {
            width: 100%;
            height: 260px;
            position: relative;
            margin: 0 0 6px;
            border: 1px solid rgba(201, 162, 39, 0.12);
            border-radius: 2px;
            background: rgba(10, 14, 26, 0.5);
            cursor: crosshair;
        }
        .nhp-price-chart canvas {
            width: 100%;
            height: 100%;
            display: block;
        }
        /* Crosshair tooltip */
        .nhp-crosshair-tooltip {
            position: absolute;
            pointer-events: none;
            background: rgba(10, 14, 26, 0.92);
            border: 1px solid rgba(201, 162, 39, 0.35);
            border-radius: 3px;
            padding: 8px 12px;
            font-size: 0.72rem;
            color: #e8e6e3;
            white-space: nowrap;
            z-index: 10;
            line-height: 1.5;
        }
        .nhp-crosshair-tooltip .tt-label {
            color: rgba(201, 162, 39, 0.6);
            font-size: 0.6rem;
            letter-spacing: 0.06em;
            text-transform: uppercase;
        }
        .nhp-crosshair-tooltip .tt-val {
            color: #e8e6e3;
            font-weight: 500;
        }
        .nhp-crosshair-tooltip .tt-green { color: #6fcf97; }
        .nhp-crosshair-tooltip .tt-red { color: #eb5757; }
        .nhp-crosshair-tooltip .tt-gold { color: #c9a227; }
        /* Scroll hint */
        .nhp-scroll-hint {
            font-size: 0.55rem;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            color: rgba(201, 162, 39, 0.3);
            text-align: right;
            margin-bottom: 4px;
        }
        .nhp-chart-label {
            font-size: 0.6rem;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            color: rgba(201, 162, 39, 0.4);
            margin-bottom: 6px;
        }
        /* Accuracy stats row */
        .nhp-accuracy-row {
            display: flex;
            gap: 16px;
            margin-bottom: 16px;
            flex-wrap: wrap;
        }
        .nhp-accuracy-stat {
            flex: 1;
            min-width: 80px;
            text-align: center;
            padding: 10px 8px;
            background: rgba(201, 162, 39, 0.05);
            border: 1px solid rgba(201, 162, 39, 0.1);
            border-radius: 2px;
        }
        .nhp-accuracy-stat .acc-label {
            font-size: 0.6rem;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            color: rgba(201, 162, 39, 0.5);
            margin-bottom: 4px;
        }
        .nhp-accuracy-stat .acc-value {
            font-size: 1.1rem;
            font-weight: 600;
        }
        .nhp-intensity-chart {
            width: 100%;
            height: 140px;
            position: relative;
            margin: 0 0 16px;
            border: 1px solid rgba(201, 162, 39, 0.12);
            border-radius: 2px;
            background: rgba(10, 14, 26, 0.5);
            cursor: crosshair;
        }
        .nhp-intensity-chart canvas {
            width: 100%;
            height: 100%;
            display: block;
        }
        .nhp-summary-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 1px;
            background: rgba(201, 162, 39, 0.08);
            border-radius: 2px;
            overflow: hidden;
            margin-top: 12px;
        }
        .nhp-summary-grid .metric {
            text-align: center;
            padding: 14px 8px;
            background: #0a0e1a;
        }
        .nhp-summary-grid .metric-label {
            font-size: 0.6rem;
            font-weight: 500;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            color: rgba(201, 162, 39, 0.5);
            margin-bottom: 6px;
        }
        .nhp-summary-grid .metric-value {
            font-size: 1rem;
            font-weight: 500;
            color: #e8e6e3;
        }
        .nhp-signals-list {
            margin-top: 16px;
        }
        .nhp-signal-row {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 8px 0;
            border-bottom: 1px solid rgba(201, 162, 39, 0.06);
            font-size: 0.85rem;
        }
        .nhp-signal-tag {
            font-size: 0.65rem;
            font-weight: 600;
            letter-spacing: 0.08em;
            padding: 3px 10px;
            border-radius: 2px;
        }
        .nhp-signal-tag.enter { background: rgba(111, 207, 151, 0.15); color: #6fcf97; }
        .nhp-signal-tag.exit { background: rgba(235, 87, 87, 0.15); color: #eb5757; }
        .nhp-signal-tag.hold { background: rgba(201, 162, 39, 0.1); color: rgba(201, 162, 39, 0.5); }
        .nhp-stat { color: rgba(255, 255, 255, 0.4); font-size: 0.8rem; }

        /* Login Page */
        .login-overlay {
            position: fixed;
            inset: 0;
            z-index: 1000;
            background: #0a0e1a;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .login-overlay.hidden { display: none; }
        .login-box {
            width: 100%;
            max-width: 380px;
            padding: 48px;
            background: rgba(201, 162, 39, 0.03);
            border: 1px solid rgba(201, 162, 39, 0.15);
            border-radius: 2px;
        }
        .login-brand {
            font-family: 'Cormorant Garamond', Georgia, serif;
            font-size: 2rem;
            font-weight: 300;
            color: #c9a227;
            text-align: center;
            margin-bottom: 8px;
        }
        .login-tagline {
            font-family: 'Cormorant Garamond', serif;
            font-size: 1rem;
            font-style: italic;
            color: rgba(201, 162, 39, 0.4);
            text-align: center;
            margin-bottom: 36px;
        }
        .login-box .control-group {
            margin-bottom: 20px;
        }
        .login-box .control-group label {
            display: block;
            font-size: 0.65rem;
            font-weight: 500;
            letter-spacing: 0.15em;
            text-transform: uppercase;
            color: rgba(201, 162, 39, 0.5);
            margin-bottom: 10px;
        }
        .login-box .control-group input {
            width: 100%;
            padding: 14px 16px;
            background: rgba(201, 162, 39, 0.04);
            border: 1px solid rgba(201, 162, 39, 0.15);
            border-radius: 1px;
            color: #ffffff;
            font-family: 'Inter', sans-serif;
            font-size: 0.85rem;
            font-weight: 300;
            letter-spacing: 0.02em;
            transition: all 0.3s ease;
            box-sizing: border-box;
        }
        .login-box .control-group input:focus {
            outline: none;
            border-color: rgba(201, 162, 39, 0.4);
        }
        .login-error {
            font-size: 0.75rem;
            color: #eb5757;

        class LSTMForecast {
            constructor(apiBaseUrl = 'https://fartpie.onrender.com', authToken = null) {
                this.apiBaseUrl = apiBaseUrl;
                this.authToken = authToken;
            }

            async getForecast(ticker, timeframe = '5m', lookback = 20) {
                const url = new URL(`${this.apiBaseUrl}/api/lstm-forecast`);
                url.searchParams.set('ticker', ticker);
                url.searchParams.set('timeframe', timeframe);
                url.searchParams.set('lookback', lookback.toString());

                const headers = { 'Content-Type': 'application/json' };
                if (this.authToken) {
                    headers['Authorization'] = `Bearer ${this.authToken}`;
                }

                const maxRetries = 4;
                for (let attempt = 0; attempt < maxRetries; attempt++) {
                    try {
                        const controller = new AbortController();
                        const timeout = setTimeout(() => controller.abort(), 90000);
                        const response = await fetch(url.toString(), {
                            method: 'GET',
                            headers: headers,
                            credentials: 'include',
                            signal: controller.signal
                        });
                        clearTimeout(timeout);

                        if (!response.ok) {
                            if (response.status >= 500 && attempt < maxRetries - 1) {
                                await new Promise(r => setTimeout(r, 5000));
                                continue;
                            }
                            let errMsg = `HTTP ${response.status}`;
                            try { const e = await response.json(); errMsg = e.error || errMsg; } catch(_) {}
                            throw new Error(errMsg);
                        }

                        return await response.json();
                    } catch (error) {
                        if (attempt === maxRetries - 1) {
                            console.error('LSTM Forecast Error:', error);
                            throw error;
                        }
                        await new Promise(r => setTimeout(r, 5000));
                    }
                }
            }

            formatForecast(forecastData) {
                if (!forecastData.success) {
                    return {
                        error: forecastData.error,
                        suggestion: forecastData.suggestion || null
                    };
                }

                const answer = forecastData.answer;
                const bounds = forecastData.theoretical_bounds;
                const levels = forecastData.levels_detected;

                return {
                    question: forecastData.question,
                    target: {
                        price: answer.target_price,
                        move: answer.target_pct_move,
                        moveFormatted: `${answer.target_pct_move >= 0 ? '+' : ''}${answer.target_pct_move.toFixed(2)}%`,
                        confidence: answer.confidence,
                        confidenceFormatted: `${(answer.confidence * 100).toFixed(1)}%`,
                        timeMinutes: answer.expected_time_minutes,
                        timeBars: answer.expected_time_bars,
                        timeFormatted: this.formatTime(answer.expected_time_minutes)
                    },
                    closestLevel: answer.closest_level,
                    attention: answer.attention_focus,
                    bounds: {
                        hod1std: bounds.hod_1std,
                        lod1std: bounds.lod_1std,
                        hod2std: bounds.hod_2std,
                        lod2std: bounds.lod_2std,
                        hod3std: bounds.hod_3std,
                        lod3std: bounds.lod_3std,
                        hodPM: bounds.hod_premarket,
                        lodPM: bounds.lod_premarket,
                        hodID: bounds.hod_intraday,
                        lodID: bounds.lod_intraday
                    },
                    levels: levels,
                    allLevels: forecastData.all_levels || [],
                    currentPrice: answer.target_price / (1 + answer.target_pct_move / 100),
                    modelUsed: forecastData.model_used
                };
            }

            formatTime(minutes) {
                if (minutes < 60) {
                    return `${Math.round(minutes)} minutes`;
                } else if (minutes < 1440) {
                    const hours = Math.floor(minutes / 60);
                    const mins = Math.round(minutes % 60);
                    return mins > 0 ? `${hours}h ${mins}m` : `${hours} hours`;
                } else {
                    const days = Math.floor(minutes / 1440);
                    const hours = Math.floor((minutes % 1440) / 60);
                    return hours > 0 ? `${days}d ${hours}h` : `${days} days`;
                }
            }

            renderForecast(formattedData, container) {
                if (formattedData.error) {
                    container.innerHTML = `
                        <div class="lstm-forecast-error">
                            <h3>Forecast Error</h3>
                            <p>${formattedData.error}</p>
                            ${formattedData.suggestion ? `<p class="suggestion">${formattedData.suggestion}</p>` : ''}
                        </div>
                    `;
                    return;
                }

                const target = formattedData.target;
                const isUp = target.move >= 0;
                const confidenceColor = target.confidence > 0.7 ? '#6fcf97' : target.confidence > 0.5 ? '#f2c94c' : '#eb5757';

                container.innerHTML = `
                    <div class="lstm-forecast-container">
                        <div class="lstm-forecast-header">
                            <h3>${formattedData.question}</h3>
                            <span class="model-badge">${formattedData.modelUsed}</span>

                                <div class="target-label">Target Price</div>
                                <div class="target-value">$${target.price.toFixed(2)}</div>
                                <div class="target-move ${isUp ? 'up' : 'down'}">
                                    ${target.moveFormatted}

                            </div>

                            <div class="target-metrics">
                                <div class="metric">
                                    <div class="metric-label">Confidence</div>
                                    <div class="metric-value" style="color: ${confidenceColor}">
                                        ${target.confidenceFormatted}
                                    </div>
                                </div>
                                <div class="metric">
                                    <div class="metric-label">Expected Time</div>
                                    <div class="metric-value">${target.timeFormatted}</div>
                                </div>
                                <div class="metric">
                                    <div class="metric-label">Time (Bars)</div>
                                    <div class="metric-value">${target.timeBars}</div>
                                </div>
                            </div>
                        </div>

                        ${formattedData.closestLevel ? `
                            <div class="lstm-forecast-level">
                                <div class="level-label">Closest Level</div>
                                <div class="level-info">
                                    <span class="level-price">$${formattedData.closestLevel.price?.toFixed(2) || 'N/A'}</span>
                                    ${formattedData.closestLevel.strength ? `
                                        <span class="level-strength">Strength: ${(formattedData.closestLevel.strength * 100).toFixed(0)}%</span>
                                    ` : ''}
                                </div>
                            </div>
                        ` : ''}

                        <div class="lstm-forecast-bounds">
                            <div class="bounds-header">Theoretical Bounds</div>
                            <div class="bounds-grid">
                                ${formattedData.bounds.hod1std ? `
                                <div class="bound-item">
                                    <div class="bound-label">HOD 1σ</div>
                                    <div class="bound-value green">$${formattedData.bounds.hod1std.toFixed(2)}</div>
                                </div>
                                <div class="bound-item">
                                    <div class="bound-label">LOD 1σ</div>
                                    <div class="bound-value red">$${formattedData.bounds.lod1std.toFixed(2)}</div>
                                </div>
                                <div class="bound-item">
                                    <div class="bound-label">HOD 2σ</div>
                                    <div class="bound-value green">$${formattedData.bounds.hod2std.toFixed(2)}</div>
                                </div>
                                <div class="bound-item">
                                    <div class="bound-label">LOD 2σ</div>
                                    <div class="bound-value red">$${formattedData.bounds.lod2std.toFixed(2)}</div>
                                </div>
                                <div class="bound-item">
                                    <div class="bound-label">HOD 3σ</div>
                                    <div class="bound-value green">$${formattedData.bounds.hod3std.toFixed(2)}</div>
                                </div>
                                <div class="bound-item">
                                    <div class="bound-label">LOD 3σ</div>
                                    <div class="bound-value red">$${formattedData.bounds.lod3std.toFixed(2)}</div>
                                </div>
                                ` : ''}
                                <div class="bound-item">
                                    <div class="bound-label">Pre-market HOD</div>
                                    <div class="bound-value">$${formattedData.bounds.hodPM.toFixed(2)}</div>
                                </div>
                                <div class="bound-item">
                                    <div class="bound-label">Pre-market LOD</div>
                                    <div class="bound-value">$${formattedData.bounds.lodPM.toFixed(2)}</div>
                                </div>
                                <div class="bound-item">
                                    <div class="bound-label">Intraday HOD</div>
                                    <div class="bound-value">$${formattedData.bounds.hodID.toFixed(2)}</div>
                                </div>
                                <div class="bound-item">
                                    <div class="bound-label">Intraday LOD</div>
                                    <div class="bound-value">$${formattedData.bounds.lodID.toFixed(2)}</div>
                                </div>
                            </div>
                        </div>

                        <div class="lstm-forecast-levels">
                            <div class="levels-header">Levels Detected</div>
                            <div class="levels-grid">
                                <div class="level-type">HDBSCAN: ${formattedData.levels.hdbscan}</div>
                                <div class="level-type">OPTICS: ${formattedData.levels.optics}</div>
                                <div class="level-type">Interaction: ${formattedData.levels.interaction}</div>
                                <div class="level-type">ML-Confluence: ${formattedData.levels.ml_confluence}</div>
                                <div class="level-type">Multiscale: ${formattedData.levels.multiscale}</div>
                                <div class="level-type">Neural Net: ${formattedData.levels.neural_network}</div>
                            </div>
                            ${(() => {
                                const allLevels = formattedData.allLevels || [];
                                const cp = formattedData.currentPrice || 0;
                                const resistance = allLevels.filter(l => (l.price || 0) > cp);
                                const support = allLevels.filter(l => (l.price || 0) <= cp);
                                const renderRow = (l, type) => {
                                    const dist = cp ? (((l.price - cp) / cp) * 100).toFixed(2) : '0.00';
                                    const color = type === 'resistance' ? '#6fcf97' : '#eb5757';
                                    const str = l.strength ? (typeof l.strength === 'number' && l.strength <= 1 ? (l.strength * 100).toFixed(0) + '%' : Math.round(l.strength) + '%') : '—';
                                    return `<div class="level-row"><span class="level-row-price" style="color:${color}">$${l.price.toFixed(2)}</span><span class="level-row-type">${l.type || l.category || ''}</span><span class="level-row-str">${str}</span><span class="level-row-dist" style="color:${parseFloat(dist) >= 0 ? '#6fcf97' : '#eb5757'}">${parseFloat(dist) >= 0 ? '+' : ''}${dist}%</span></div>`;
                                };
                                let html = '';
                                if (resistance.length > 0) {
                                    html += `<div class="level-list-section"><div class="level-list-header">Resistance (${resistance.length})</div>${resistance.slice(0, 15).map(l => renderRow(l, 'resistance')).join('')}</div>`;
                                }
                                if (support.length > 0) {
                                    html += `<div class="level-list-section"><div class="level-list-header">Support (${support.length})</div>${support.slice(0, 15).map(l => renderRow(l, 'support')).join('')}</div>`;
                                }
                                return html;
                            })()}
                        </div>

                        ${formattedData.attention && formattedData.attention.weights ? `
                            <div class="lstm-forecast-attention">
                                <div class="attention-header">Attention Focus</div>
                                <div class="attention-info">
                                    Most important bar: ${formattedData.attention.most_important_bar}
                                </div>
                            </div>
                        ` : ''}
                    </div>
                `;
            }
        }

        // ===== NHP Rendering =====
        function computeAccuracy(nhp) {
            const closes = nhp.ohlc?.close;
            const lows = nhp.ohlc?.low;
            const highs = nhp.ohlc?.high;
            const signals = nhp.signals || [];
            if (!closes || !lows || !highs || closes.length < 5)
                return { enter: null, exit: null, overall: null, enterTotal: 0, exitTotal: 0 };

            let enterCorrect = 0, enterTotal = 0, exitCorrect = 0, exitTotal = 0;

            signals.forEach(s => {
                const idx = s.bar_index;
                if (idx + 1 >= closes.length) return;
                const entryPrice = closes[idx];

                if (s.signal === 'ENTER') {
                    enterTotal++;
                    // Scan forward: win if price rises 1%+ before drawing down 1%+
                    // A drawdown below entry means loss
                    let resolved = false;
                    for (let j = idx + 1; j < closes.length; j++) {
                        if (lows[j] < entryPrice) {
                            // Price broke below entry — loss (drawdown)
                            resolved = true;
                            break;
                        }
                        if (highs[j] > entryPrice * 1.005) {
                            // Price moved up 0.5%+ without breaking below entry — win
                            enterCorrect++;
                            resolved = true;
                            break;
                        }
                    }
                    // If unresolved (never broke below and never hit target), check last close
                    if (!resolved && closes[closes.length - 1] >= entryPrice) {
                        enterCorrect++;
                    }
                } else if (s.signal === 'EXIT') {
                    exitTotal++;
                    // Scan forward: win if price drops below entry before rallying above
                    let resolved = false;
                    for (let j = idx + 1; j < closes.length; j++) {
                        if (highs[j] > entryPrice) {
                            // Price rallied above exit price — loss
                            resolved = true;
                            break;
                        }
                        if (lows[j] < entryPrice * 0.995) {
                            // Price dropped 0.5%+ without rallying above — win
                            exitCorrect++;
                            resolved = true;
                            break;
                        }
                    }
                    if (!resolved && closes[closes.length - 1] <= entryPrice) {
                        exitCorrect++;
                    }
                }
            });

            const total = enterTotal + exitTotal;
            const correct = enterCorrect + exitCorrect;
            return {
                enter: enterTotal > 0 ? ((enterCorrect / enterTotal) * 100).toFixed(0) : null,
                exit: exitTotal > 0 ? ((exitCorrect / exitTotal) * 100).toFixed(0) : null,
                overall: total > 0 ? ((correct / total) * 100).toFixed(0) : null,
                enterTotal, exitTotal,
                enterCorrect, exitCorrect,
            };
        }

        function renderNhpSection(nhp, selectedTf) {
            if (!nhp || !nhp.success) return '';
            const summary = nhp.summary || {};
            const signals = nhp.signals || [];
            const trained = nhp.model_trained;
            const lastSignals = signals.slice(-12);
            const statusColor = trained ? '#6fcf97' : '#c9a227';
            const statusText = trained ? 'Trained' : 'Price-Driven';
            const acc = computeAccuracy(nhp);

            const tfOptions = [
                {v:'1m',l:'1m'},{v:'5m',l:'5m'},{v:'15m',l:'15m'},
                {v:'1h',l:'1h'},{v:'4h',l:'4h'},{v:'1d',l:'1D'}
            ];
            const tfSelect = tfOptions.map(o =>
                `<option value="${o.v}"${o.v === selectedTf ? ' selected' : ''}>${o.l}</option>`
            ).join('');

                return `<div class="nhp-signal-row">
