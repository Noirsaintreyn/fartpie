<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LSTM Forecast - Advanced Price Prediction</title>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;0,700;1,300;1,400&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            min-height: 100vh;
            background: #0a0e1a;
            color: #e8e6e3;
            overflow-x: hidden;
        }

        /* Navigation */
        .nav {
            position: fixed;
            top: 0; left: 0; right: 0;
            z-index: 100;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 24px 48px;
            background: rgba(10, 14, 26, 0.9);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-bottom: 1px solid rgba(201, 162, 39, 0.15);
        }
        .nav-brand {
            font-family: 'Cormorant Garamond', Georgia, serif;
            font-size: 1.4rem;
            font-weight: 400;
            letter-spacing: 0.15em;
            text-transform: uppercase;
            color: #c9a227;
        }
        .nav-links { display: flex; gap: 40px; list-style: none; }
        .nav-links a {
            font-size: 0.75rem;
            font-weight: 400;
            letter-spacing: 0.12em;
            text-transform: uppercase;
            color: rgba(201, 162, 39, 0.5);
            text-decoration: none;
            transition: color 0.3s ease;
        }
        .nav-links a:hover, .nav-links a.active { color: #c9a227; }
        .nav-right { display: flex; gap: 24px; align-items: center; }
        .logout-link {
            font-size: 0.65rem;
            letter-spacing: 0.12em;
            text-transform: uppercase;
            color: rgba(201, 162, 39, 0.5);
            text-decoration: none;
            border: 1px solid rgba(201, 162, 39, 0.2);
            padding: 6px 14px;
            transition: all 0.3s ease;
        }
        .logout-link:hover { color: #c9a227; border-color: rgba(201, 162, 39, 0.5); }

        /* Hero Section */
        .hero {
            position: relative;
            min-height: 100vh;
            display: flex;
            align-items: center;
            padding: 120px 48px 80px;
        }
        .hero-bg {
            position: absolute;
            inset: 0;
            background: radial-gradient(ellipse at 70% 50%, rgba(15, 20, 50, 0.6) 0%, transparent 70%);
            pointer-events: none;
        }
        .hero-content {
            position: relative;
            z-index: 2;
            width: 100%;
            max-width: 1400px;
            margin: 0 auto;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 80px;
            align-items: center;
        }
        .hero-text { max-width: 560px; }
        .hero-title {
            font-family: 'Cormorant Garamond', Georgia, serif;
            font-size: 4.5rem;
            font-weight: 300;
            line-height: 1.1;
            color: #ffffff;
            margin-bottom: 32px;
        }
        .hero-desc {
            font-family: 'Cormorant Garamond', serif;
            font-size: 1.6em;
            font-weight: 300;
            font-style: italic;
            color: rgba(232, 230, 227, 0.45);
            letter-spacing: 0.04em;
            margin-bottom: 48px;
            max-width: 420px;
        }

        /* Forecast Panel */
        .forecast-panel {
            background: rgba(201, 162, 39, 0.03);
            border: 1px solid rgba(201, 162, 39, 0.15);
            border-radius: 2px;
            padding: 48px;
            animation: fadeIn 1s ease-out 0.3s both;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .panel-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 40px;
            padding-bottom: 20px;
            border-bottom: 1px solid rgba(201, 162, 39, 0.12);
        }
        .panel-title {
            font-family: 'Cormorant Garamond', Georgia, serif;
            font-size: 1.5rem;
            font-weight: 400;
            color: #ffffff;
        }
        .panel-badge {
            font-size: 0.65rem;
            font-weight: 500;
            letter-spacing: 0.15em;
            text-transform: uppercase;
            color: rgba(201, 162, 39, 0.6);
            border: 1px solid rgba(201, 162, 39, 0.2);
            padding: 6px 14px;
        }

        /* Controls */
        .controls { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 32px; }
        .control-group { display: flex; flex-direction: column; }
        .control-group.full-width { grid-column: 1 / -1; }
        .control-group label {
            font-size: 0.65rem;
            font-weight: 500;
            letter-spacing: 0.15em;
            text-transform: uppercase;
            color: rgba(201, 162, 39, 0.6);
            margin-bottom: 10px;
        }
        .control-group input, .control-group select {
            width: 100%;
            padding: 14px 16px;
            background: rgba(201, 162, 39, 0.04);
            border: 1px solid rgba(201, 162, 39, 0.18);
            border-radius: 1px;
            color: #ffffff;
            font-family: 'Inter', sans-serif;
            font-size: 0.85rem;
            font-weight: 300;
            transition: all 0.3s ease;
        }
        .control-group input::placeholder { color: rgba(255, 255, 255, 0.2); }
        .control-group select option { background: #0a0e1a; color: #ffffff; }
        .control-group input:focus, .control-group select:focus {
            outline: none;
            border-color: rgba(201, 162, 39, 0.4);
        }

        .btn {
            width: 100%;
            padding: 16px 32px;
            background: transparent;
            border: 1px solid rgba(201, 162, 39, 0.3);
            color: #c9a227;
            font-family: 'Inter', sans-serif;
            font-size: 0.7rem;
            font-weight: 500;
            letter-spacing: 0.2em;
            text-transform: uppercase;
            cursor: pointer;
            transition: all 0.4s ease;
        }
        .btn:hover { background: rgba(201, 162, 39, 0.08); border-color: rgba(201, 162, 39, 0.5); }
        .btn:disabled { opacity: 0.3; cursor: not-allowed; }

        /* Loading */
        .loading { text-align: center; padding: 60px 20px; color: rgba(255, 255, 255, 0.4); }
        .spinner {
            width: 32px; height: 32px;
            border: 1px solid rgba(201, 162, 39, 0.15);
            border-top: 1px solid rgba(201, 162, 39, 0.6);
            border-radius: 50%;
            animation: spin 1.2s linear infinite;
            margin: 0 auto 24px;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .loading p { font-size: 0.75rem; font-weight: 400; letter-spacing: 0.1em; text-transform: uppercase; }

        .divider { width: 60px; height: 1px; background: rgba(201, 162, 39, 0.3); margin: 0 auto 48px; }

        /* Responsive */
        @media (max-width: 1024px) {
            .hero-content { grid-template-columns: 1fr; gap: 48px; }
            .hero-title { font-size: 3rem; }
            .nav { padding: 20px 24px; }
            .hero { padding: 120px 24px 60px; }
        }
        @media (max-width: 640px) {
            .hero-title { font-size: 2.2rem; }
            .controls { grid-template-columns: 1fr; }
            .nav-links { display: none; }
            .forecast-panel { padding: 32px 24px; }
        }

        /* Result styles */
        .result-container {
            background: rgba(201, 162, 39, 0.03);
            border: 1px solid rgba(201, 162, 39, 0.12);
            border-radius: 2px;
            padding: 32px;
        }
        .result-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 28px;
            padding-bottom: 16px;
            border-bottom: 1px solid rgba(201, 162, 39, 0.12);
        }
        .result-header h3 {
            margin: 0;
            font-family: 'Cormorant Garamond', Georgia, serif;
            font-size: 1.25rem;
            font-weight: 400;
            color: #ffffff;
        }
        .model-badge {
            font-size: 0.6rem;
            font-weight: 500;
            letter-spacing: 0.15em;
            text-transform: uppercase;
            color: rgba(201, 162, 39, 0.6);
            border: 1px solid rgba(201, 162, 39, 0.2);
            padding: 5px 12px;
        }

        /* Target Price */
        .target-section { margin: 24px 0; }
        .target-price-box {
            text-align: center;
            margin-bottom: 28px;
            padding: 32px 0;
            border-bottom: 1px solid rgba(201, 162, 39, 0.08);
        }
        .target-label {
            font-size: 0.65rem;
            font-weight: 500;
            letter-spacing: 0.2em;
            text-transform: uppercase;
            color: rgba(201, 162, 39, 0.5);
            margin-bottom: 12px;
        }
        .target-value {
            font-family: 'Cormorant Garamond', Georgia, serif;
            font-size: 3rem;
            font-weight: 300;
            color: #ffffff;
            margin: 8px 0;
        }
        .target-move {
            font-size: 0.85rem;
            font-weight: 500;
            padding: 6px 16px;
            display: inline-block;
        }
        .target-move.up { color: #6fcf97; border: 1px solid rgba(111, 207, 151, 0.15); }
        .target-move.down { color: #eb5757; border: 1px solid rgba(235, 87, 87, 0.15); }

        /* Metrics grid */
        .metrics-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 1px;
            background: rgba(201, 162, 39, 0.08);
            border: 1px solid rgba(201, 162, 39, 0.12);
            border-radius: 2px;
            overflow: hidden;
        }
        .metric {
            text-align: center;
            padding: 20px 12px;
            background: #0a0e1a;
        }
        .metric-label {
            font-size: 0.6rem;
            font-weight: 500;
            letter-spacing: 0.15em;
            text-transform: uppercase;
            color: rgba(201, 162, 39, 0.5);
            margin-bottom: 8px;
        }
        .metric-value { font-size: 1rem; font-weight: 400; color: #ffffff; }

        /* Closest level */
        .closest-level {
            margin: 24px 0;
            padding: 20px 24px;
            border-left: 1px solid rgba(201, 162, 39, 0.3);
            background: rgba(201, 162, 39, 0.03);
        }
        .level-label {
            font-size: 0.65rem;
            font-weight: 500;
            letter-spacing: 0.15em;
            text-transform: uppercase;
            color: rgba(201, 162, 39, 0.5);
            margin-bottom: 12px;
        }
        .level-info { display: flex; justify-content: space-between; align-items: center; }
        .level-price {
            font-family: 'Cormorant Garamond', Georgia, serif;
            font-size: 1.4rem;
            font-weight: 400;
            color: #ffffff;
        }
        .level-strength { font-size: 0.75rem; color: rgba(255, 255, 255, 0.35); }

        /* Bounds section */
        .bounds-section, .levels-section {
            margin: 24px 0;
            padding: 24px;
            background: rgba(201, 162, 39, 0.03);
            border: 1px solid rgba(201, 162, 39, 0.08);
        }
        .section-header {
            font-size: 0.65rem;
            font-weight: 500;
            letter-spacing: 0.15em;
            text-transform: uppercase;
            color: rgba(201, 162, 39, 0.5);
            margin-bottom: 16px;
        }
        .bounds-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 1px;
            background: rgba(201, 162, 39, 0.08);
            border-radius: 2px;
            overflow: hidden;
        }
        .bound-item { padding: 16px; background: #0a0e1a; }
        .bound-label {
            font-size: 0.6rem;
            font-weight: 500;
            letter-spacing: 0.12em;
            text-transform: uppercase;
            color: rgba(201, 162, 39, 0.45);
            margin-bottom: 6px;
        }
        .bound-value { font-size: 0.95rem; font-weight: 400; color: #ffffff; }
        .bound-value.green { color: #6fcf97; }
        .bound-value.red { color: #eb5757; }

        /* Levels grid */
        .levels-counts {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(120px, 1fr));
            gap: 1px;
            background: rgba(201, 162, 39, 0.08);
            border-radius: 2px;
            overflow: hidden;
            margin-bottom: 16px;
        }
        .level-type {
            padding: 12px 16px;
            background: #0a0e1a;
            font-size: 0.8rem;
            text-align: center;
            color: rgba(255, 255, 255, 0.6);
            font-weight: 300;
        }

        /* Level list */
        .level-list { margin-top: 16px; }
        .level-list-header {
            font-size: 0.6rem;
            font-weight: 500;
            letter-spacing: 0.15em;
            text-transform: uppercase;
            color: rgba(201, 162, 39, 0.5);
            padding: 8px 0;
            margin-top: 12px;
        }
        .level-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 8px 0;
            border-bottom: 1px solid rgba(201, 162, 39, 0.06);
        }
        .level-row:last-child { border-bottom: none; }
        .level-row-price {
            font-family: 'Cormorant Garamond', Georgia, serif;
            font-size: 1.05rem;
            font-weight: 400;
            min-width: 100px;
        }
        .level-row-price.resistance { color: #6fcf97; }
        .level-row-price.support { color: #eb5757; }
        .level-row-type {
            font-size: 0.72rem;
            color: rgba(255, 255, 255, 0.4);
            flex: 1;
            padding: 0 12px;
        }
        .level-row-meta {
            display: flex;
            gap: 16px;
            align-items: center;
        }
        .level-row-strength {
            font-size: 0.72rem;
            color: rgba(255, 255, 255, 0.35);
        }
        .level-row-distance {
            font-size: 0.72rem;
            min-width: 50px;
            text-align: right;
        }
        .level-row-distance.pos { color: #6fcf97; }
        .level-row-distance.neg { color: #eb5757; }

        /* NHP Signals */
        .nhp-section {
            margin: 24px 0;
            padding: 24px;
            background: rgba(201, 162, 39, 0.03);
            border: 1px solid rgba(201, 162, 39, 0.08);
        }
        .nhp-intensity-chart {
            width: 100%;
            height: 120px;
            position: relative;
            margin: 16px 0;
            border: 1px solid rgba(201, 162, 39, 0.12);
            border-radius: 2px;
            overflow: hidden;
        }
        .nhp-intensity-chart canvas {
            width: 100%;
            height: 100%;
        }
        .nhp-signals-list {
            margin-top: 12px;
        }
        .nhp-signal-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 6px 0;
            border-bottom: 1px solid rgba(201, 162, 39, 0.06);
            font-size: 0.8rem;
        }
        .nhp-signal-row:last-child { border-bottom: none; }
        .nhp-signal-tag {
            font-size: 0.65rem;
            font-weight: 600;
            letter-spacing: 0.1em;
            padding: 3px 10px;
            border-radius: 1px;
        }
        .nhp-signal-tag.enter {
            color: #6fcf97;
            border: 1px solid rgba(111, 207, 151, 0.2);
        }
        .nhp-signal-tag.exit {
            color: #eb5757;
            border: 1px solid rgba(235, 87, 87, 0.2);
        }
        .nhp-signal-tag.hold {
            color: rgba(201, 162, 39, 0.5);
            border: 1px solid rgba(201, 162, 39, 0.15);
        }
        .nhp-stat {
            font-size: 0.75rem;
            color: rgba(255, 255, 255, 0.45);
        }
        .nhp-summary-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 1px;
            background: rgba(201, 162, 39, 0.08);
            border-radius: 2px;
            overflow: hidden;
            margin-top: 12px;
        }

        /* Error */
        .forecast-error {
            padding: 32px;
            background: rgba(201, 162, 39, 0.03);
            border: 1px solid rgba(201, 162, 39, 0.12);
            border-left: 2px solid #eb5757;
        }
        .forecast-error h3 {
            font-family: 'Cormorant Garamond', Georgia, serif;
            font-weight: 400;
            font-size: 1.1rem;
            color: #eb5757;
            margin-bottom: 12px;
        }
        .forecast-error p { color: rgba(255, 255, 255, 0.5); font-size: 0.85rem; line-height: 1.6; }
    </style>
</head>
<body>
    <nav class="nav">
        <div class="nav-brand">LSTM Forecast</div>
        <div class="nav-right">
            <ul class="nav-links">
                <li><a href="#" class="active">Forecast</a></li>
                <li><a href="#">Analysis</a></li>
                <li><a href="#">Levels</a></li>
                <li><a href="#">Models</a></li>
            </ul>
            <a href="/logout" class="logout-link">Logout</a>
        </div>
    </nav>

    <section class="hero">
        <div class="hero-bg"></div>
        <div class="hero-content">
            <div class="hero-text">
                <h1 class="hero-title">L'argent parle.</h1>
                <p class="hero-desc">Nous traduisons.</p>
                <div class="divider" style="margin: 0;"></div>
            </div>

            <div class="forecast-panel">
                <div class="panel-header">
                    <div class="panel-title">Run Forecast</div>
                    <div class="panel-badge">Live</div>
                </div>

                <div class="controls">
                    <div class="control-group">
                        <label for="username">Username</label>
                        <input type="text" id="username" placeholder="Enter username">
                    </div>
                    <div class="control-group">
                        <label for="password">Password</label>
                        <input type="password" id="password" placeholder="Enter password">
                    </div>
                    <div class="control-group">
                        <label for="ticker">Ticker</label>
                        <input type="text" id="ticker" value="SPY" placeholder="SPY, NQ=F, etc.">
                    </div>
                    <div class="control-group">
                        <label for="timeframe">Timeframe</label>
                        <select id="timeframe">
                            <option value="1m">1 Minute</option>
                            <option value="5m">5 Minutes</option>
                            <option value="15m">15 Minutes</option>
                            <option value="1h" selected>1 Hour</option>
                            <option value="4h">4 Hours</option>
                            <option value="1d">1 Day</option>
                        </select>
                    </div>
                    <div class="control-group full-width">
                        <button class="btn" id="getForecast">Get Forecast</button>
                    </div>
                </div>

                <div id="forecastContainer"></div>
            </div>
        </div>
    </section>

    <script>
        const btn = document.getElementById('getForecast');
        const container = document.getElementById('forecastContainer');

        function formatTime(minutes) {
            if (minutes < 60) return `${Math.round(minutes)} minutes`;
            if (minutes < 1440) {
                const h = Math.floor(minutes / 60);
                const m = Math.round(minutes % 60);
                return m > 0 ? `${h}h ${m}m` : `${h} hours`;
            }
            const d = Math.floor(minutes / 1440);
            const h = Math.floor((minutes % 1440) / 60);
            return h > 0 ? `${d}d ${h}h` : `${d} days`;
        }

        function renderForecast(data, nhpData) {
            if (!data.success) {
                container.innerHTML = `
                    <div class="forecast-error">
                        <h3>Forecast Error</h3>
                        <p>${data.error || 'Unknown error'}</p>
                        ${data.suggestion ? `<p style="color:rgba(255,255,255,0.4);font-style:italic">${data.suggestion}</p>` : ''}
                    </div>`;
                return;
            }

            const answer = data.answer;
            const bounds = data.theoretical_bounds;
            const levelCounts = data.levels_detected;
            const allLevels = data.all_levels || [];
            const currentPrice = answer.target_price / (1 + answer.target_pct_move / 100);
            const isUp = answer.target_pct_move >= 0;
            const confColor = answer.confidence > 0.7 ? '#6fcf97' : answer.confidence > 0.5 ? '#f2c94c' : '#eb5757';

            // Split levels into resistance and support
            const resistance = allLevels.filter(l => l.price > currentPrice).sort((a, b) => a.price - b.price);
            const support = allLevels.filter(l => l.price <= currentPrice).sort((a, b) => b.price - a.price);

            function levelRows(levels, type) {
                return levels.slice(0, 15).map(l => {
                    const dist = ((l.price - currentPrice) / currentPrice * 100);
                    const distStr = dist >= 0 ? `+${dist.toFixed(2)}%` : `${dist.toFixed(2)}%`;
                    const strength = l.strength ? `${(l.strength * 100).toFixed(0)}%` : '';
                    const cat = l.type || l.category || '';
                    return `<div class="level-row">
                        <span class="level-row-price ${type}">\$${l.price.toFixed(2)}</span>
                        <span class="level-row-type">${cat}</span>
                        <span class="level-row-meta">
                            <span class="level-row-strength">${strength}</span>
                            <span class="level-row-distance ${dist >= 0 ? 'pos' : 'neg'}">${distStr}</span>
                        </span>
                    </div>`;
                }).join('');
            }

            container.innerHTML = `
                <div class="result-container">
                    <div class="result-header">
                        <h3>${data.question || 'Where is price going?'}</h3>
                        <span class="model-badge">${data.model_used || 'Heuristic'}</span>
                    </div>

                    <div class="target-section">
                        <div class="target-price-box">
                            <div class="target-label">Target Price</div>
                            <div class="target-value">\$${answer.target_price.toFixed(2)}</div>
                            <div class="target-move ${isUp ? 'up' : 'down'}">
                                ${answer.target_pct_move >= 0 ? '+' : ''}${answer.target_pct_move.toFixed(2)}%
                            </div>
                        </div>

                        <div class="metrics-grid">
                            <div class="metric">
                                <div class="metric-label">Confidence</div>
                                <div class="metric-value" style="color:${confColor}">${(answer.confidence * 100).toFixed(1)}%</div>
                            </div>
                            <div class="metric">
                                <div class="metric-label">Expected Time</div>
                                <div class="metric-value">${formatTime(answer.expected_time_minutes)}</div>
                            </div>
                            <div class="metric">
                                <div class="metric-label">Time (Bars)</div>
                                <div class="metric-value">${answer.expected_time_bars}</div>
                            </div>
                        </div>
                    </div>

                    ${answer.closest_level ? `
                        <div class="closest-level">
                            <div class="level-label">Closest Level</div>
                            <div class="level-info">
                                <span class="level-price">\$${answer.closest_level.price?.toFixed(2) || 'N/A'}</span>
                                ${answer.closest_level.strength ? `<span class="level-strength">Strength: ${(answer.closest_level.strength * 100).toFixed(0)}%</span>` : ''}
                            </div>
                        </div>
                    ` : ''}

                    <div class="bounds-section">
                        <div class="section-header">Theoretical Bounds</div>
                        <div class="bounds-grid">
                            ${bounds.hod_1std ? `
                                <div class="bound-item">
                                    <div class="bound-label">HOD 1\u03c3</div>
                                    <div class="bound-value green">\$${bounds.hod_1std.toFixed(2)}</div>
                                </div>
                                <div class="bound-item">
                                    <div class="bound-label">LOD 1\u03c3</div>
                                    <div class="bound-value red">\$${bounds.lod_1std.toFixed(2)}</div>
                                </div>
                                <div class="bound-item">
                                    <div class="bound-label">HOD 2\u03c3</div>
                                    <div class="bound-value green">\$${bounds.hod_2std.toFixed(2)}</div>
                                </div>
                                <div class="bound-item">
                                    <div class="bound-label">LOD 2\u03c3</div>
                                    <div class="bound-value red">\$${bounds.lod_2std.toFixed(2)}</div>
                                </div>
                                <div class="bound-item">
                                    <div class="bound-label">HOD 3\u03c3</div>
                                    <div class="bound-value green">\$${bounds.hod_3std.toFixed(2)}</div>
                                </div>
                                <div class="bound-item">
                                    <div class="bound-label">LOD 3\u03c3</div>
                                    <div class="bound-value red">\$${bounds.lod_3std.toFixed(2)}</div>
                                </div>
                            ` : ''}
                            <div class="bound-item">
                                <div class="bound-label">Pre-Market HOD</div>
                                <div class="bound-value">\$${bounds.hod_premarket.toFixed(2)}</div>
                            </div>
                            <div class="bound-item">
                                <div class="bound-label">Pre-Market LOD</div>
                                <div class="bound-value">\$${bounds.lod_premarket.toFixed(2)}</div>
                            </div>
                            <div class="bound-item">
                                <div class="bound-label">Intraday HOD</div>
                                <div class="bound-value">\$${bounds.hod_intraday.toFixed(2)}</div>
                            </div>
                            <div class="bound-item">
                                <div class="bound-label">Intraday LOD</div>
                                <div class="bound-value">\$${bounds.lod_intraday.toFixed(2)}</div>
                            </div>
                        </div>
                    </div>

                    <div class="levels-section">
                        <div class="section-header">Levels Detected</div>
                        <div class="levels-counts">
                            <div class="level-type">HDBSCAN: ${levelCounts.hdbscan}</div>
                            <div class="level-type">OPTICS: ${levelCounts.optics}</div>
                            <div class="level-type">Interaction: ${levelCounts.interaction}</div>
                            <div class="level-type">ML-Confluence: ${levelCounts.ml_confluence}</div>
                            <div class="level-type">Multiscale: ${levelCounts.multiscale}</div>
                        </div>

                        ${resistance.length > 0 ? `
                            <div class="level-list">
                                <div class="level-list-header">Resistance (${resistance.length})</div>
                                ${levelRows(resistance, 'resistance')}
                            </div>
                        ` : ''}

                        ${support.length > 0 ? `
                            <div class="level-list">
                                <div class="level-list-header">Support (${support.length})</div>
                                ${levelRows(support, 'support')}
                            </div>
                        ` : ''}
                    </div>

                    ${nhpData && nhpData.success ? renderNhpSection(nhpData) : ''}
                </div>`;

            // Draw NHP intensity chart after DOM is updated
            if (nhpData && nhpData.success) {
                requestAnimationFrame(() => drawNhpChart(nhpData));
            }
        }

        function renderNhpSection(nhp) {
            if (!nhp || !nhp.signals) return '';

            const summary = nhp.summary || {};
            const signals = nhp.signals || [];
            const lastSignals = signals.slice(-8);

            const signalRows = lastSignals.map(s => {
                const cls = s.signal === 'ENTER' ? 'enter' : s.signal === 'EXIT' ? 'exit' : 'hold';
                return `<div class="nhp-signal-row">
                    <span class="nhp-signal-tag ${cls}">${s.signal}</span>
                    <span class="nhp-stat">bar ${s.bar_index}</span>
                    <span class="nhp-stat">\u03bb=${s.lambda_t.toFixed(3)}</span>
                    <span class="nhp-stat">${(s.confidence * 100).toFixed(0)}%</span>
                </div>`;
            }).join('');

            return `
                <div class="nhp-section">
                    <div class="section-header">Neural Hawkes Process &mdash; Intensity Signals</div>

                    <div class="nhp-intensity-chart">
                        <canvas id="nhpCanvas"></canvas>
                    </div>

                    <div class="nhp-summary-grid">
                        <div class="metric">
                            <div class="metric-label">Mean \u03bb</div>
                            <div class="metric-value">${summary.mean_intensity?.toFixed(3) || '?'}</div>
                        </div>
                        <div class="metric">
                            <div class="metric-label">Enter</div>
                            <div class="metric-value" style="color:#6fcf97">${summary.n_enter_signals ?? 0}</div>
                        </div>
                        <div class="metric">
                            <div class="metric-label">Exit</div>
                            <div class="metric-value" style="color:#eb5757">${summary.n_exit_signals ?? 0}</div>
                        </div>
                    </div>

                    ${lastSignals.length > 0 ? `
                        <div class="nhp-signals-list">
                            <div class="level-list-header">Recent Signals (last ${lastSignals.length})</div>
                            ${signalRows}
                        </div>
                    ` : '<p class="nhp-stat" style="margin-top:12px">No signals in current window</p>'}
                </div>`;
        }

        function drawNhpChart(nhp) {
            const canvas = document.getElementById('nhpCanvas');
            if (!canvas || !nhp || !nhp.intensity_values) return;
            const ctx = canvas.getContext('2d');
            const dpr = window.devicePixelRatio || 1;
            const rect = canvas.getBoundingClientRect();
            canvas.width = rect.width * dpr;
            canvas.height = rect.height * dpr;
            ctx.scale(dpr, dpr);
            const W = rect.width, H = rect.height;

            const vals = nhp.intensity_values;
            const n = vals.length;
            if (n < 2) return;

            const maxV = Math.max(...vals) || 1;
            const minV = Math.min(...vals);
            const range = maxV - minV || 1;

            // Draw intensity line
            ctx.strokeStyle = 'rgba(255, 255, 255, 0.5)';
            ctx.lineWidth = 1;
            ctx.beginPath();
            for (let i = 0; i < n; i++) {
                const x = (i / (n - 1)) * W;
                const y = H - ((vals[i] - minV) / range) * (H - 8) - 4;
                i === 0 ? ctx.moveTo(x, y) : ctx.lineTo(x, y);
            }
            ctx.stroke();

            // Fill area under curve
            ctx.fillStyle = 'rgba(255, 255, 255, 0.03)';
            ctx.beginPath();
            for (let i = 0; i < n; i++) {
                const x = (i / (n - 1)) * W;
                const y = H - ((vals[i] - minV) / range) * (H - 8) - 4;
                i === 0 ? ctx.moveTo(x, y) : ctx.lineTo(x, y);
            }
            ctx.lineTo(W, H);
            ctx.lineTo(0, H);
            ctx.closePath();
            ctx.fill();

            // Draw signal markers
            const times = nhp.intensity_times || [];
            const tMax = times.length > 0 ? times[times.length - 1] : 1;
            (nhp.signals || []).forEach(s => {
                const xPct = tMax > 0 ? s.time / tMax : 0;
                const x = xPct * W;
                const color = s.signal === 'ENTER' ? '#6fcf97' : s.signal === 'EXIT' ? '#eb5757' : 'rgba(255,255,255,0.2)';
                ctx.strokeStyle = color;
                ctx.lineWidth = 1;
                ctx.setLineDash([2, 2]);
                ctx.beginPath();
                ctx.moveTo(x, 0);
                ctx.lineTo(x, H);
                ctx.stroke();
                ctx.setLineDash([]);
            });
        }

        btn.addEventListener('click', async () => {
            const ticker = document.getElementById('ticker').value.trim();
            const timeframe = document.getElementById('timeframe').value;

            if (!ticker) { alert('Please enter a ticker symbol'); return; }

            btn.disabled = true;
            container.innerHTML = `<div class="loading"><div class="spinner"></div><p>Analyzing...</p></div>`;

            try {
                // Fetch LSTM forecast and NHP signals in parallel
                const forecastUrl = new URL('/api/lstm-forecast', window.location.origin);
                forecastUrl.searchParams.set('ticker', ticker);
                forecastUrl.searchParams.set('timeframe', timeframe);
                forecastUrl.searchParams.set('lookback', '20');

                const nhpUrl = new URL('/api/nhp-signals', window.location.origin);
                nhpUrl.searchParams.set('ticker', ticker);
                nhpUrl.searchParams.set('timeframe', timeframe);

                const [forecastResp, nhpResp] = await Promise.all([
                    fetch(forecastUrl.toString(), { credentials: 'include' }),
                    fetch(nhpUrl.toString(), { credentials: 'include' }).catch(() => null),
                ]);

                if (!forecastResp.ok) {
                    const err = await forecastResp.json();
                    throw new Error(err.error || `HTTP ${forecastResp.status}`);
                }

                const data = await forecastResp.json();
                let nhpData = null;
                if (nhpResp && nhpResp.ok) {
                    try { nhpData = await nhpResp.json(); } catch(e) {}
                }

                renderForecast(data, nhpData);
            } catch (err) {
                container.innerHTML = `<div class="forecast-error"><h3>Error</h3><p>${err.message}</p></div>`;
            } finally {
                btn.disabled = false;
            }
        });
    </script>
</body>
</html>
