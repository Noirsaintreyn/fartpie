<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Level Detection Analysis</title>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;0,700;1,300;1,400&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            min-height: 100vh;
            background: #0a0a0a;
            color: #e8e6e3;
            overflow-x: hidden;
        }

        /* Navigation */
        .nav {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 20px 40px;
            border-bottom: 1px solid rgba(232, 230, 227, 0.08);
        }
        .nav-brand {
            font-family: 'Cormorant Garamond', serif;
            font-size: 1.4em;
            font-weight: 600;
            letter-spacing: 0.15em;
            text-transform: uppercase;
        }
        .nav-links { display: flex; gap: 30px; align-items: center; }
        .nav-link {
            font-size: 0.75em;
            letter-spacing: 0.12em;
            text-transform: uppercase;
            color: rgba(232, 230, 227, 0.5);
            text-decoration: none;
            transition: color 0.3s ease;
        }
        .nav-link:hover { color: #e8e6e3; }
        .logout-link {
            font-size: 0.75em;
            letter-spacing: 0.12em;
            text-transform: uppercase;
            color: rgba(232, 230, 227, 0.4);
            text-decoration: none;
            border: 1px solid rgba(232, 230, 227, 0.15);
            padding: 8px 18px;
            transition: all 0.3s ease;
        }
        .logout-link:hover { color: #e8e6e3; border-color: rgba(232, 230, 227, 0.3); }

        /* Hero */
        .hero { text-align: center; padding: 50px 40px 30px; }
        .hero h1 {
            font-family: 'Cormorant Garamond', serif;
            font-size: 3.2em;
            font-weight: 300;
            letter-spacing: 0.02em;
            line-height: 1.1;
            margin-bottom: 12px;
        }
        .hero p {
            font-family: 'Cormorant Garamond', serif;
            font-size: 1.6em;
            font-weight: 300;
            font-style: italic;
            color: rgba(232, 230, 227, 0.45);
            letter-spacing: 0.04em;
        }

        /* Main content */
        .main-content { max-width: 1200px; margin: 0 auto; padding: 0 40px 60px; }

        /* Section titles */
        .section-label {
            font-size: 0.7em;
            letter-spacing: 0.2em;
            text-transform: uppercase;
            color: rgba(232, 230, 227, 0.35);
            margin-bottom: 24px;
            padding-bottom: 12px;
            border-bottom: 1px solid rgba(232, 230, 227, 0.06);
        }

        /* Form grid */
        .form-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }
        .form-group { display: flex; flex-direction: column; }
        .form-group label {
            font-size: 0.7em;
            font-weight: 500;
            letter-spacing: 0.15em;
            text-transform: uppercase;
            color: rgba(232, 230, 227, 0.5);
            margin-bottom: 8px;
        }
        .form-group input, .form-group select {
            padding: 12px 14px;
            background: rgba(232, 230, 227, 0.04);
            border: 1px solid rgba(232, 230, 227, 0.1);
            color: #e8e6e3;
            font-family: 'Inter', sans-serif;
            font-size: 14px;
            transition: all 0.3s ease;
        }
        .form-group input::placeholder { color: rgba(232, 230, 227, 0.25); }
        .form-group input:focus, .form-group select:focus {
            outline: none;
            border-color: rgba(232, 230, 227, 0.3);
            background: rgba(232, 230, 227, 0.06);
        }
        .form-group select option { background: #1a1a1a; color: #e8e6e3; }

        /* Buttons */
        .btn-row { display: flex; gap: 12px; justify-content: center; margin-bottom: 30px; flex-wrap: wrap; }
        .btn {
            background: transparent;
            border: 1px solid rgba(232, 230, 227, 0.2);
            color: #e8e6e3;
            padding: 12px 28px;
            font-family: 'Inter', sans-serif;
            font-size: 0.75em;
            font-weight: 500;
            letter-spacing: 0.12em;
            text-transform: uppercase;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .btn:hover { background: rgba(232, 230, 227, 0.06); border-color: rgba(232, 230, 227, 0.35); }
        .btn:disabled { opacity: 0.4; cursor: not-allowed; }

        /* Results area */
        .results {
            margin-top: 20px;
            padding: 24px;
            border: 1px solid rgba(232, 230, 227, 0.08);
            min-height: 120px;
        }

        .loading {
            text-align: center;
            padding: 30px;
            color: rgba(232, 230, 227, 0.4);
            font-size: 0.85em;
        }

        .error {
            background: rgba(235, 87, 87, 0.08);
            color: #eb5757;
            padding: 14px 18px;
            margin: 10px 0;
            border-left: 2px solid #eb5757;
            font-size: 0.85em;
        }

        .success {
            background: rgba(111, 207, 151, 0.08);
            color: #6fcf97;
            padding: 14px 18px;
            margin: 10px 0;
            border-left: 2px solid #6fcf97;
            font-size: 0.85em;
        }

        /* Price header */
        .price-header {
            display: flex;
            align-items: baseline;
            gap: 16px;
            margin-bottom: 24px;
            padding-bottom: 16px;
            border-bottom: 1px solid rgba(232, 230, 227, 0.06);
        }
        .price-header .current-price {
            font-family: 'Cormorant Garamond', serif;
            font-size: 2.4em;
            font-weight: 500;
        }
        .price-header .price-label {
            font-size: 0.7em;
            letter-spacing: 0.15em;
            text-transform: uppercase;
            color: rgba(232, 230, 227, 0.4);
        }

        /* Intraday target */
        .intraday-target {
            background: rgba(232, 230, 227, 0.03);
            border: 1px solid rgba(232, 230, 227, 0.1);
            padding: 20px 24px;
            margin-bottom: 24px;
        }
        .intraday-target .target-label {
            font-size: 0.65em;
            letter-spacing: 0.2em;
            text-transform: uppercase;
            color: rgba(232, 230, 227, 0.4);
            margin-bottom: 8px;
        }
        .intraday-target .target-price {
            font-family: 'Cormorant Garamond', serif;
            font-size: 1.8em;
            font-weight: 500;
        }
        .intraday-target .target-meta {
            font-size: 0.75em;
            color: rgba(232, 230, 227, 0.45);
            margin-top: 6px;
        }
        .direction-up { color: #6fcf97; }
        .direction-down { color: #eb5757; }

        /* THOD/TLOD section */
        .thod-tlod-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 16px;
            margin-bottom: 24px;
        }
        .thod-card, .tlod-card {
            padding: 18px 20px;
            border: 1px solid rgba(232, 230, 227, 0.08);
        }
        .thod-card { border-left: 2px solid rgba(111, 207, 151, 0.5); }
        .tlod-card { border-left: 2px solid rgba(235, 87, 87, 0.5); }
        .thod-card .card-label, .tlod-card .card-label {
            font-size: 0.6em;
            letter-spacing: 0.2em;
            text-transform: uppercase;
            color: rgba(232, 230, 227, 0.4);
            margin-bottom: 10px;
        }
        .std-row {
            display: flex;
            justify-content: space-between;
            align-items: baseline;
            padding: 4px 0;
        }
        .std-label {
            font-size: 0.7em;
            color: rgba(232, 230, 227, 0.45);
        }
        .std-price {
            font-family: 'Cormorant Garamond', serif;
            font-size: 1.15em;
            font-weight: 500;
        }
        .predicted-row {
            margin-top: 8px;
            padding-top: 8px;
            border-top: 1px solid rgba(232, 230, 227, 0.06);
        }
        .predicted-label {
            font-size: 0.6em;
            letter-spacing: 0.15em;
            text-transform: uppercase;
            color: rgba(232, 230, 227, 0.3);
        }
        .predicted-price {
            font-family: 'Cormorant Garamond', serif;
            font-size: 1.4em;
            font-weight: 600;
        }
        .confidence-tag {
            font-size: 0.65em;
            color: rgba(232, 230, 227, 0.35);
        }

        /* Level category sections */
        .level-category {
            margin-bottom: 20px;
        }
        .level-category-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 0;
            cursor: pointer;
            border-bottom: 1px solid rgba(232, 230, 227, 0.06);
        }
        .level-category-header:hover { background: rgba(232, 230, 227, 0.02); }
        .level-category-title {
            font-size: 0.7em;
            letter-spacing: 0.15em;
            text-transform: uppercase;
            color: rgba(232, 230, 227, 0.5);
        }
        .level-category-count {
            font-size: 0.7em;
            color: rgba(232, 230, 227, 0.3);
        }
        .level-category-body {
            padding: 8px 0;
        }
        .level-category-body.collapsed { display: none; }

        /* Level cards */
        .level-row {
            display: grid;
            grid-template-columns: 100px 1fr 80px 80px;
            align-items: center;
            padding: 8px 12px;
            border-bottom: 1px solid rgba(232, 230, 227, 0.03);
            font-size: 0.85em;
        }
        .level-row:hover { background: rgba(232, 230, 227, 0.02); }
        .level-price {
            font-family: 'Cormorant Garamond', serif;
            font-size: 1.15em;
            font-weight: 500;
        }
        .level-distance {
            font-size: 0.8em;
            color: rgba(232, 230, 227, 0.4);
        }
        .level-strength {
            font-size: 0.75em;
            color: rgba(232, 230, 227, 0.5);
            text-align: right;
        }
        .level-position {
            font-size: 0.65em;
            text-align: right;
            letter-spacing: 0.05em;
        }
        .above-price { color: rgba(111, 207, 151, 0.7); }
        .below-price { color: rgba(235, 87, 87, 0.7); }

        /* Regime info */
        .regime-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
            gap: 12px;
            margin-bottom: 24px;
        }
        .regime-card {
            padding: 14px 16px;
            border: 1px solid rgba(232, 230, 227, 0.06);
            background: rgba(232, 230, 227, 0.02);
        }
        .regime-label {
            font-size: 0.6em;
            letter-spacing: 0.15em;
            text-transform: uppercase;
            color: rgba(232, 230, 227, 0.35);
            margin-bottom: 6px;
        }
        .regime-value {
            font-size: 0.9em;
            font-weight: 500;
        }

        /* Metric cards */
        .metric {
            display: inline-block;
            margin: 8px 12px 8px 0;
            padding: 12px 18px;
            border: 1px solid rgba(232, 230, 227, 0.08);
        }
        .metric-label {
            font-size: 0.65em;
            letter-spacing: 0.15em;
            text-transform: uppercase;
            color: rgba(232, 230, 227, 0.4);
        }
        .metric-value {
            font-family: 'Cormorant Garamond', serif;
            font-size: 1.4em;
            font-weight: 500;
            margin-top: 4px;
        }

        /* Results headings */
        .results h3 {
            font-family: 'Cormorant Garamond', serif;
            font-size: 1.3em;
            font-weight: 400;
            margin: 20px 0 10px;
            color: rgba(232, 230, 227, 0.7);
        }

        /* Backtest section */
        .backtest-section {
            margin-top: 60px;
            padding-top: 40px;
            border-top: 1px solid rgba(232, 230, 227, 0.06);
        }
        .backtest-results {
            border: 1px solid rgba(232, 230, 227, 0.08);
            padding: 24px;
            margin-top: 20px;
        }

        /* Responsive */
        @media (max-width: 768px) {
            .nav { padding: 15px 20px; flex-direction: column; gap: 15px; }
            .hero { padding: 40px 20px 30px; }
            .hero h1 { font-size: 2.2em; }
            .main-content { padding: 0 20px 40px; }
            .form-grid { grid-template-columns: 1fr; }
            .btn-row { flex-direction: column; align-items: stretch; }
            .thod-tlod-grid { grid-template-columns: 1fr; }
            .level-row { grid-template-columns: 90px 1fr 70px; }
            .level-position { display: none; }
        }
    </style>
</head>
<body>
    <nav class="nav">
        <div class="nav-brand">Level Detection</div>
        <div class="nav-links">
            <a href="#" class="nav-link">Analysis</a>
            <a href="#backtest-section" class="nav-link">Backtest</a>
            <a href="/logout" class="logout-link">Logout</a>
        </div>
    </nav>

    <div class="hero">
        <h1>L'argent parle.</h1>
        <p>Nous traduisons.</p>
    </div>

    <div class="main-content">
        <div class="section-label">Market Analysis</div>

        <div class="form-grid">
            <div class="form-group">
                <label for="ticker">Ticker Symbol</label>
                <input type="text" id="ticker" value="SPY" placeholder="e.g., SPY, NQ=, ES=">
            </div>
            <div class="form-group">
                <label for="timeframe">Timeframe</label>
                <select id="timeframe">
                    <option value="1m">1 Minute</option>
                    <option value="5m">5 Minutes</option>
                    <option value="15m">15 Minutes</option>
                    <option value="1h">1 Hour</option>
                    <option value="4h">4 Hours</option>
                    <option value="1d" selected>Daily</option>
                </select>
            </div>
        </div>

        <div class="btn-row">
            <button class="btn" onclick="analyzeLevels()">Analyze Levels</button>
            <button class="btn" onclick="trainNeuralNetwork()">Train Neural Network</button>
            <button class="btn" onclick="initializeData()">Initialize Google Drive Data</button>
        </div>

        <div id="results" class="results">
            <div class="loading">
                Enter parameters and click "Analyze Levels" to begin
            </div>
        </div>

        <!-- Backtest Section -->
        <div class="backtest-section" id="backtest-section">
            <div class="section-label">Level Backtesting</div>
            <div class="form-grid">
                <div class="form-group">
                    <label for="backtest_ticker">Backtest Ticker</label>
                    <input type="text" id="backtest_ticker" value="SPY" placeholder="e.g., SPY">
                </div>
                <div class="form-group">
                    <label for="backtest_timeframe">Timeframe</label>
                    <select id="backtest_timeframe">
                        <option value="1d" selected>Daily</option>
                        <option value="1h">1 Hour</option>
                        <option value="4h">4 Hours</option>
                    </select>
                </div>
                <div class="form-group">
                    <label for="backtest_method">Detection Method</label>
                    <select id="backtest_method">
                        <option value="hdbscan">HDBSCAN</option>
                        <option value="neural_network">Neural Network</option>
                        <option value="all">All Methods</option>
                    </select>
                </div>
                <div class="form-group">
                    <label for="test_window">Test Window (bars)</label>
                    <input type="number" id="test_window" value="20" min="5" max="50">
                </div>
            </div>
            <div class="btn-row">
                <button class="btn" onclick="runBacktest()">Run Backtest</button>
                <button class="btn" onclick="viewBacktestHistory()">View History</button>
            </div>
            <div id="backtest_results" class="backtest-results">
                <div class="loading">
                    Configure backtest parameters and click "Run Backtest" to begin
                </div>
            </div>
        </div>
    </div>

    <script>
        const API_BASE = window.location.origin + '/api';

        async function analyzeLevels() {
            const ticker = document.getElementById('ticker').value;
            const timeframe = document.getElementById('timeframe').value;
            const resultsDiv = document.getElementById('results');
            resultsDiv.innerHTML = '<div class="loading">Analyzing levels...</div>';

            try {
                const params = new URLSearchParams({
                    ticker: ticker,
                    timeframe: timeframe,
                    lookback: 200,
                    combine_mode: 'auto'
                });

                // Fetch levels + THOD/TLOD in parallel
                const [dataResp, hodlodResp] = await Promise.all([
                    fetch(`${API_BASE}/data?${params}`),
                    fetch(`${API_BASE}/level-constrained-hod-lod?ticker=${ticker}&timeframe=${timeframe}`)
                ]);

                const data = await dataResp.json();
                let hodlod = null;
                try { hodlod = await hodlodResp.json(); } catch(e) {}

                if (data.success) {
                    displayResults(data, hodlod);
                } else {
                    resultsDiv.innerHTML = `<div class="error">Error: ${data.error}</div>`;
                }
            } catch (error) {
                resultsDiv.innerHTML = `<div class="error">Network error: ${error.message}</div>`;
            }
        }

        function displayResults(data, hodlod) {
            const resultsDiv = document.getElementById('results');
            const levels = data.levels;
            const currentPrice = data.currentPrice;
            const mpp = data.mostProbablePath;

            let html = '';

            // Price header
            html += `
                <div class="price-header">
                    <span class="current-price">$${currentPrice?.toFixed(2) || 'N/A'}</span>
                    <span class="price-label">Current Price</span>
                </div>
            `;

            // Intraday target
            if (mpp && mpp.target_level && mpp.target_level.price) {
                const dirClass = mpp.direction === 'up' ? 'direction-up' : 'direction-down';
                const arrow = mpp.direction === 'up' ? '\u2191' : '\u2193';
                html += `
                    <div class="intraday-target">
                        <div class="target-label">Intraday Target</div>
                        <div class="target-price ${dirClass}">
                            ${arrow} $${mpp.target_level.price.toFixed(2)}
                        </div>
                        <div class="target-meta">
                            ${mpp.method || ''} &middot; 
                            Probability: ${(mpp.probability * 100).toFixed(0)}% &middot;
                            Direction: ${mpp.direction || 'neutral'}
                        </div>
                    </div>
                `;
            } else if (mpp && mpp.path && mpp.path.length > 0) {
                const finalPrice = mpp.path[mpp.path.length - 1];
                const dirClass = finalPrice > currentPrice ? 'direction-up' : 'direction-down';
                const arrow = finalPrice > currentPrice ? '\u2191' : '\u2193';
                html += `
                    <div class="intraday-target">
                        <div class="target-label">Price Forecast (${mpp.forecast_periods || 30} periods)</div>
                        <div class="target-price ${dirClass}">
                            ${arrow} $${finalPrice.toFixed(2)}
                        </div>
                        <div class="target-meta">
                            ${mpp.method || ''} &middot; 
                            Direction: ${mpp.direction || 'neutral'}
                        </div>
                    </div>
                `;
            }

            // THOD/TLOD
            if (hodlod && hodlod.success) {
                html += renderThodTlod(hodlod, currentPrice);
            }

            // Regime info
            html += renderRegimeInfo(data);

            // Levels detected summary
            const levelCounts = getLevelCounts(levels);
            const totalLevels = Object.values(levelCounts).reduce((a, b) => a + b, 0);

            html += `<h3>Levels Detected</h3>`;
            html += `<div style="font-size:0.8em; color:rgba(232,230,227,0.5); margin-bottom:12px;">`;
            html += Object.entries(levelCounts)
                .filter(([k, v]) => v > 0)
                .map(([k, v]) => `${k}: ${v}`)
                .join(' &middot; ');
            html += ` &middot; Total: ${totalLevels}</div>`;

            // Render each level category
            const categoryOrder = [
                { key: 'structural', label: 'Structural (HDBSCAN / OPTICS / KDE / Multiscale / Wyckoff)' },
                { key: 'mlConfluence', label: 'ML Confluence' },
                { key: 'interaction', label: 'Interaction (Local Density)' },
                { key: 'event', label: 'Event / Pivot' },
                { key: 'fallback', label: 'Fallback (Peak-Valley)' },
                { key: 'peakValley', label: 'Peak-Valley' },
                { key: 'pivots', label: 'Classical Pivots' },
                { key: 'gaps', label: 'Gap Levels' },
            ];

            for (const cat of categoryOrder) {
                const catLevels = levels[cat.key];
                if (!catLevels || !Array.isArray(catLevels) || catLevels.length === 0) continue;

                // Sort by distance from current price
                const sorted = [...catLevels]
                    .filter(l => l && l.price != null && isFinite(l.price))
                    .sort((a, b) => Math.abs(a.price - currentPrice) - Math.abs(b.price - currentPrice));

                html += renderLevelCategory(cat.label, sorted, currentPrice, cat.key);
            }

            // Classical structural (nested)
            if (levels.classicalStructural) {
                const cs = levels.classicalStructural;
                if (cs.pivots && cs.pivots.length > 0) {
                    const sorted = [...cs.pivots].sort((a, b) => Math.abs(a.price - currentPrice) - Math.abs(b.price - currentPrice));
                    html += renderLevelCategory('Classical Pivots', sorted, currentPrice, 'cs-pivots');
                }
                if (cs.gaps && cs.gaps.length > 0) {
                    const sorted = [...cs.gaps].sort((a, b) => Math.abs(a.price - currentPrice) - Math.abs(b.price - currentPrice));
                    html += renderLevelCategory('Gap Levels', sorted, currentPrice, 'cs-gaps');
                }
            }

            resultsDiv.innerHTML = html;
        }

        function renderThodTlod(hodlod, currentPrice) {
            let html = '<div class="thod-tlod-grid">';

            // THOD side
            html += '<div class="thod-card">';
            html += '<div class="card-label">Theoretical High of Day</div>';
            if (hodlod.hod) {
                const hod = hodlod.hod;
                html += `
                    <div class="std-row"><span class="std-label">1 StdDev</span><span class="std-price direction-up">$${hod['1std']?.toFixed(2) || 'N/A'}</span></div>
                    <div class="std-row"><span class="std-label">2 StdDev</span><span class="std-price direction-up">$${hod['2std']?.toFixed(2) || 'N/A'}</span></div>
                    <div class="std-row"><span class="std-label">3 StdDev</span><span class="std-price direction-up">$${hod['3std']?.toFixed(2) || 'N/A'}</span></div>
                `;
            }
            if (hodlod.predicted && hodlod.predicted.hod) {
                const conf = hodlod.predicted.hod_confidence ? (hodlod.predicted.hod_confidence * 100).toFixed(0) + '%' : '';
                html += `
                    <div class="predicted-row">
                        <div class="predicted-label">Predicted HOD</div>
                        <div class="predicted-price direction-up">$${hodlod.predicted.hod.toFixed(2)}</div>
                        ${conf ? `<div class="confidence-tag">${conf} confidence</div>` : ''}
                    </div>
                `;
            }
            html += '</div>';

            // TLOD side
            html += '<div class="tlod-card">';
            html += '<div class="card-label">Theoretical Low of Day</div>';
            if (hodlod.lod) {
                const lod = hodlod.lod;
                html += `
                    <div class="std-row"><span class="std-label">1 StdDev</span><span class="std-price direction-down">$${lod['1std']?.toFixed(2) || 'N/A'}</span></div>
                    <div class="std-row"><span class="std-label">2 StdDev</span><span class="std-price direction-down">$${lod['2std']?.toFixed(2) || 'N/A'}</span></div>
                    <div class="std-row"><span class="std-label">3 StdDev</span><span class="std-price direction-down">$${lod['3std']?.toFixed(2) || 'N/A'}</span></div>
                `;
            }
            if (hodlod.predicted && hodlod.predicted.lod) {
                const conf = hodlod.predicted.lod_confidence ? (hodlod.predicted.lod_confidence * 100).toFixed(0) + '%' : '';
                html += `
                    <div class="predicted-row">
                        <div class="predicted-label">Predicted LOD</div>
                        <div class="predicted-price direction-down">$${hodlod.predicted.lod.toFixed(2)}</div>
                        ${conf ? `<div class="confidence-tag">${conf} confidence</div>` : ''}
                    </div>
                `;
            }
            html += '</div>';

            html += '</div>';
            return html;
        }

        function renderRegimeInfo(data) {
            let html = '<div class="regime-grid">';

            if (data.volRegime) {
                html += `
                    <div class="regime-card">
                        <div class="regime-label">Vol Regime</div>
                        <div class="regime-value">${data.volRegime.regime || 'N/A'}</div>
                    </div>
                `;
            }
            if (data.microstructureState) {
                html += `
                    <div class="regime-card">
                        <div class="regime-label">Market State</div>
                        <div class="regime-value">${data.microstructureState.state || 'N/A'}</div>
                    </div>
                `;
            }
            if (data.hmmRegime) {
                html += `
                    <div class="regime-card">
                        <div class="regime-label">HMM Regime</div>
                        <div class="regime-value">${data.hmmRegime.regime || 'N/A'}</div>
                    </div>
                `;
            }
            if (data.hurstData) {
                html += `
                    <div class="regime-card">
                        <div class="regime-label">Hurst Exponent</div>
                        <div class="regime-value">${data.hurstData.hurst?.toFixed(3) || 'N/A'} (${data.hurstData.regime || ''})</div>
                    </div>
                `;
            }

            html += '</div>';
            return html;
        }

        function renderLevelCategory(label, levels, currentPrice, catKey) {
            if (!levels || levels.length === 0) return '';

            // Split into above and below
            const above = levels.filter(l => l.price >= currentPrice).sort((a, b) => a.price - b.price);
            const below = levels.filter(l => l.price < currentPrice).sort((a, b) => b.price - a.price);

            let html = `<div class="level-category">`;
            html += `<div class="level-category-header" onclick="toggleCategory('${catKey}')">
                        <span class="level-category-title">${label}</span>
                        <span class="level-category-count">${levels.length} levels</span>
                     </div>`;
            html += `<div class="level-category-body" id="cat-${catKey}">`;

            // Resistance (above price)
            if (above.length > 0) {
                html += `<div style="font-size:0.65em; letter-spacing:0.15em; text-transform:uppercase; color:rgba(111,207,151,0.5); padding:6px 12px;">Resistance</div>`;
                for (const level of above) {
                    html += renderLevelRow(level, currentPrice, true);
                }
            }

            // Support (below price)
            if (below.length > 0) {
                html += `<div style="font-size:0.65em; letter-spacing:0.15em; text-transform:uppercase; color:rgba(235,87,87,0.5); padding:6px 12px;">Support</div>`;
                for (const level of below) {
                    html += renderLevelRow(level, currentPrice, false);
                }
            }

            html += '</div></div>';
            return html;
        }

        function renderLevelRow(level, currentPrice, isAbove) {
            const price = level.price?.toFixed(2) || 'N/A';
            const distPct = currentPrice ? (((level.price - currentPrice) / currentPrice) * 100).toFixed(2) : '?';
            const strength = level.strength ? (level.strength * 100).toFixed(0) + '%' : '';
            const category = level.category || level.type || '';
            const posClass = isAbove ? 'above-price' : 'below-price';

            return `
                <div class="level-row">
                    <span class="level-price">$${price}</span>
                    <span class="level-distance">${category}${level.source ? ' (' + level.source + ')' : ''}</span>
                    <span class="level-strength">${strength}</span>
                    <span class="level-position ${posClass}">${distPct}%</span>
                </div>
            `;
        }

        function getLevelCounts(levels) {
            const counts = {};

            // Count by category within structural
            if (levels.structural && Array.isArray(levels.structural)) {
                for (const l of levels.structural) {
                    const cat = l.category || 'Structural';
                    // Map to user-friendly names
                    let displayCat = cat;
                    if (cat.includes('HDBSCAN') && !cat.includes('Multi')) displayCat = 'HDBSCAN';
                    else if (cat.includes('Multi')) displayCat = 'Multiscale';
                    else if (cat.includes('OPTICS')) displayCat = 'OPTICS';
                    else if (cat.includes('KDE')) displayCat = 'KDE';
                    else if (cat.includes('Wyckoff')) displayCat = 'Wyckoff';
                    else if (cat.includes('Neural') || cat.includes('NN')) displayCat = 'Neural Network';
                    else if (cat.includes('Time')) displayCat = 'Time-Weighted';
                    else if (cat.includes('Persistent') || cat.includes('TDA')) displayCat = 'TDA';

                    counts[displayCat] = (counts[displayCat] || 0) + 1;
                }
            }

            // Count other categories
            const otherKeys = ['mlConfluence', 'interaction', 'event', 'fallback', 'peakValley'];
            const otherLabels = { mlConfluence: 'ML-Confluence', interaction: 'Interaction', event: 'Event', fallback: 'Fallback', peakValley: 'Peak-Valley' };
            for (const key of otherKeys) {
                if (levels[key] && Array.isArray(levels[key]) && levels[key].length > 0) {
                    counts[otherLabels[key] || key] = levels[key].length;
                }
            }

            return counts;
        }

        function toggleCategory(catKey) {
            const body = document.getElementById('cat-' + catKey);
            if (body) body.classList.toggle('collapsed');
        }

        function countAllLevels(levels) {
            let count = 0;
            Object.values(levels).forEach(val => {
                if (Array.isArray(val)) count += val.length;
                else if (val && typeof val === 'object') {
                    Object.values(val).forEach(v2 => { if (Array.isArray(v2)) count += v2.length; });
                }
            });
            return count;
        }

        async function runBacktest() {
            const ticker = document.getElementById('backtest_ticker').value;
            const timeframe = document.getElementById('backtest_timeframe').value;
            const method = document.getElementById('backtest_method').value;
            const testWindow = document.getElementById('test_window').value;
            const resultsDiv = document.getElementById('backtest_results');
            resultsDiv.innerHTML = '<div class="loading">Running backtest...</div>';

            try {
                const params = new URLSearchParams({ ticker, timeframe, method, test_window: testWindow });
                const response = await fetch(`${API_BASE}/backtest?${params}`);
                const data = await response.json();

                if (data.success) {
                    displayBacktestResults(data);
                } else {
                    resultsDiv.innerHTML = `<div class="error">Error: ${data.error}</div>`;
                }
            } catch (error) {
                resultsDiv.innerHTML = `<div class="error">Network error: ${error.message}</div>`;
            }
        }

        function displayBacktestResults(data) {
            const resultsDiv = document.getElementById('backtest_results');
            let html = `
                <div class="success">
                    <strong>Backtest Complete</strong><br>
                    Ticker: ${data.ticker} | Timeframe: ${data.timeframe}<br>
                    Method: ${data.method}
                </div>
            `;
            if (data.results) {
                html += `
                    <div class="metric"><div class="metric-label">Total Levels</div><div class="metric-value">${data.results.total_levels || 0}</div></div>
                    <div class="metric"><div class="metric-label">Touched Levels</div><div class="metric-value">${data.results.touched_levels || 0}</div></div>
                    <div class="metric"><div class="metric-label">Breakouts</div><div class="metric-value">${data.results.breakout_levels || 0}</div></div>
                    <div class="metric"><div class="metric-label">Touch Rate</div><div class="metric-value">${data.results.touch_rate ? (data.results.touch_rate * 100).toFixed(1) + '%' : 'N/A'}</div></div>
                `;
            }
            resultsDiv.innerHTML = html;
        }

        async function trainNeuralNetwork() {
            const resultsDiv = document.getElementById('results');
            resultsDiv.innerHTML = '<div class="loading">Training neural network... (this may take a few minutes)</div>';
            try {
                const response = await fetch(`${API_BASE}/train-level-detector`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ ticker: 'SPY', timeframe: '1d', epochs: 30 })
                });
                const data = await response.json();
                if (data.success) {
                    resultsDiv.innerHTML = `<div class="success">Neural network trained successfully! Model saved to ${data.model_path}</div>`;
                } else {
                    resultsDiv.innerHTML = `<div class="error">Training failed: ${data.error}</div>`;
                }
            } catch (error) {
                resultsDiv.innerHTML = `<div class="error">Network error: ${error.message}</div>`;
            }
        }

        async function initializeData() {
            const resultsDiv = document.getElementById('results');
            resultsDiv.innerHTML = '<div class="loading">Initializing Google Drive data...</div>';
            try {
                const response = await fetch(`${API_BASE}/initialize-data`, { method: 'POST' });
                const data = await response.json();
                if (data.success) {
                    resultsDiv.innerHTML = `<div class="success">Google Drive data initialized successfully! Available symbols: ${data.available_symbols?.join(', ') || 'N/A'}</div>`;
                } else {
                    resultsDiv.innerHTML = `<div class="error">Initialization failed: ${data.error}</div>`;
                }
            } catch (error) {
                resultsDiv.innerHTML = `<div class="error">Network error: ${error.message}</div>`;
            }
        }

        function viewBacktestHistory() { window.open('/backtest', '_blank'); }

        document.addEventListener('DOMContentLoaded', function() {
            document.querySelectorAll('input').forEach(input => {
                input.addEventListener('keypress', function(e) {
                    if (e.key === 'Enter') analyzeLevels();
                });
            });
        });
    </script>
</body>
</html>
