<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Level Detection Analysis</title>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;0,700;1,300;1,400&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            min-height: 100vh;
            background: #0a0a0a;
            color: #e8e6e3;
            overflow-x: hidden;
            padding: 0;
        }

        /* Navigation */
        .nav {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 20px 40px;
            border-bottom: 1px solid rgba(232, 230, 227, 0.08);
        }

        .nav-brand {
            font-family: 'Cormorant Garamond', serif;
            font-size: 1.4em;
            font-weight: 600;
            letter-spacing: 0.15em;
            text-transform: uppercase;
            color: #e8e6e3;
        }

        .nav-links {
            display: flex;
            gap: 30px;
            align-items: center;
        }

        .nav-link {
            font-size: 0.75em;
            letter-spacing: 0.12em;
            text-transform: uppercase;
            color: rgba(232, 230, 227, 0.5);
            text-decoration: none;
            transition: color 0.3s ease;
        }

        .nav-link:hover {
            color: #e8e6e3;
        }

        .logout-link {
            font-size: 0.75em;
            letter-spacing: 0.12em;
            text-transform: uppercase;
            color: rgba(232, 230, 227, 0.4);
            text-decoration: none;
            transition: color 0.3s ease;
            border: 1px solid rgba(232, 230, 227, 0.15);
            padding: 8px 18px;
        }

        .logout-link:hover {
            color: #e8e6e3;
            border-color: rgba(232, 230, 227, 0.3);
        }

        /* Hero */
        .hero {
            text-align: center;
            padding: 60px 40px 40px;
        }

        .hero h1 {
            font-family: 'Cormorant Garamond', serif;
            font-size: 3.2em;
            font-weight: 300;
            letter-spacing: 0.02em;
            line-height: 1.1;
            margin-bottom: 12px;
        }

        .hero p {
            font-size: 0.85em;
            color: rgba(232, 230, 227, 0.45);
            letter-spacing: 0.08em;
            text-transform: uppercase;
        }

        /* Main content */
        .main-content {
            max-width: 1100px;
            margin: 0 auto;
            padding: 0 40px 60px;
        }

        /* Section titles */
        .section-label {
            font-size: 0.7em;
            letter-spacing: 0.2em;
            text-transform: uppercase;
            color: rgba(232, 230, 227, 0.35);
            margin-bottom: 24px;
            padding-bottom: 12px;
            border-bottom: 1px solid rgba(232, 230, 227, 0.06);
        }

        /* Form grid */
        .form-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .form-group {
            display: flex;
            flex-direction: column;
        }

        .form-group label {
            font-size: 0.7em;
            font-weight: 500;
            letter-spacing: 0.15em;
            text-transform: uppercase;
            color: rgba(232, 230, 227, 0.5);
            margin-bottom: 8px;
        }

        .form-group input,
        .form-group select {
            padding: 12px 14px;
            background: rgba(232, 230, 227, 0.04);
            border: 1px solid rgba(232, 230, 227, 0.1);
            color: #e8e6e3;
            font-family: 'Inter', sans-serif;
            font-size: 14px;
            transition: all 0.3s ease;
        }

        .form-group input::placeholder {
            color: rgba(232, 230, 227, 0.25);
        }

        .form-group input:focus,
        .form-group select:focus {
            outline: none;
            border-color: rgba(232, 230, 227, 0.3);
            background: rgba(232, 230, 227, 0.06);
        }

        .form-group select option {
            background: #1a1a1a;
            color: #e8e6e3;
        }

        /* Buttons */
        .btn-row {
            display: flex;
            gap: 12px;
            justify-content: center;
            margin-bottom: 30px;
            flex-wrap: wrap;
        }

        .btn {
            background: transparent;
            border: 1px solid rgba(232, 230, 227, 0.2);
            color: #e8e6e3;
            padding: 12px 28px;
            font-family: 'Inter', sans-serif;
            font-size: 0.75em;
            font-weight: 500;
            letter-spacing: 0.12em;
            text-transform: uppercase;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .btn:hover {
            background: rgba(232, 230, 227, 0.06);
            border-color: rgba(232, 230, 227, 0.35);
        }

        .btn:disabled {
            opacity: 0.4;
            cursor: not-allowed;
        }

        /* Results area */
        .results {
            margin-top: 20px;
            padding: 24px;
            border: 1px solid rgba(232, 230, 227, 0.08);
            min-height: 120px;
        }

        .loading {
            text-align: center;
            padding: 30px;
            color: rgba(232, 230, 227, 0.4);
            font-size: 0.85em;
        }

        .error {
            background: rgba(235, 87, 87, 0.08);
            color: #eb5757;
            padding: 14px 18px;
            margin: 10px 0;
            border-left: 2px solid #eb5757;
            font-size: 0.85em;
        }

        .success {
            background: rgba(111, 207, 151, 0.08);
            color: #6fcf97;
            padding: 14px 18px;
            margin: 10px 0;
            border-left: 2px solid #6fcf97;
            font-size: 0.85em;
        }

        .level-info {
            padding: 14px 18px;
            margin: 8px 0;
            border-left: 2px solid rgba(232, 230, 227, 0.15);
            background: rgba(232, 230, 227, 0.02);
        }

        .level-price {
            font-family: 'Cormorant Garamond', serif;
            font-size: 1.3em;
            font-weight: 500;
            color: #e8e6e3;
        }

        .level-type {
            font-size: 0.7em;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            color: rgba(232, 230, 227, 0.4);
            margin-top: 2px;
        }

        .level-strength {
            font-size: 0.8em;
            color: rgba(232, 230, 227, 0.55);
            margin-top: 4px;
        }

        /* Results headings */
        .results h3 {
            font-family: 'Cormorant Garamond', serif;
            font-size: 1.3em;
            font-weight: 400;
            margin: 20px 0 10px;
            color: rgba(232, 230, 227, 0.7);
        }

        /* Backtest section */
        .backtest-section {
            margin-top: 60px;
            padding-top: 40px;
            border-top: 1px solid rgba(232, 230, 227, 0.06);
        }

        .backtest-results {
            border: 1px solid rgba(232, 230, 227, 0.08);
            padding: 24px;
            margin-top: 20px;
        }

        .metric {
            display: inline-block;
            margin: 8px 12px 8px 0;
            padding: 12px 18px;
            border: 1px solid rgba(232, 230, 227, 0.08);
        }

        .metric-label {
            font-size: 0.65em;
            letter-spacing: 0.15em;
            text-transform: uppercase;
            color: rgba(232, 230, 227, 0.4);
        }

        .metric-value {
            font-family: 'Cormorant Garamond', serif;
            font-size: 1.4em;
            font-weight: 500;
            color: #e8e6e3;
            margin-top: 4px;
        }

        /* Responsive */
        @media (max-width: 768px) {
            .nav {
                padding: 15px 20px;
                flex-direction: column;
                gap: 15px;
            }

            .hero {
                padding: 40px 20px 30px;
            }

            .hero h1 {
                font-size: 2.2em;
            }

            .main-content {
                padding: 0 20px 40px;
            }

            .form-grid {
                grid-template-columns: 1fr;
            }

            .btn-row {
                flex-direction: column;
                align-items: stretch;
            }
        }
    </style>
</head>
<body>
    <!-- Navigation -->
    <nav class="nav">
        <div class="nav-brand">Level Detection</div>
        <div class="nav-links">
            <a href="#" class="nav-link">Analysis</a>
            <a href="#backtest-section" class="nav-link">Backtest</a>
            <a href="/logout" class="logout-link">Logout</a>
        </div>
    </nav>

    <!-- Hero -->
    <div class="hero">
        <h1>Advanced Level<br>Detection Analysis</h1>
        <p>Neural Networks &middot; HDBSCAN &middot; Market Structure</p>
    </div>

    <!-- Main Content -->
    <div class="main-content">
        <!-- Analysis Section -->
        <div class="section-label">Market Analysis</div>

        <div class="form-grid">
            <div class="form-group">
                <label for="ticker">Ticker Symbol</label>
                <input type="text" id="ticker" value="SPY" placeholder="e.g., SPY, NQ=, ES=">
            </div>

            <div class="form-group">
                <label for="timeframe">Timeframe</label>
                <select id="timeframe">
                    <option value="1m">1 Minute</option>
                    <option value="5m">5 Minutes</option>
                    <option value="15m">15 Minutes</option>
                    <option value="1h">1 Hour</option>
                    <option value="4h">4 Hours</option>
                    <option value="1d" selected>Daily</option>
                </select>
            </div>

            <div class="form-group">
                <label for="lookback">Lookback Period</label>
                <input type="number" id="lookback" value="200" min="50" max="500">
            </div>

            <div class="form-group">
                <label for="data_source">Data Source</label>
                <select id="data_source">
                    <option value="auto">Auto (Google Drive + yfinance)</option>
                    <option value="combined">Google Drive + Real-time</option>
                    <option value="historical">Historical Only</option>
                    <option value="yfinance">yfinance Only</option>
                </select>
            </div>
        </div>

        <div class="btn-row">
            <button class="btn" onclick="analyzeLevels()">Analyze Levels</button>
            <button class="btn" onclick="trainNeuralNetwork()">Train Neural Network</button>
            <button class="btn" onclick="initializeData()">Initialize Google Drive Data</button>
        </div>

        <div id="results" class="results">
            <div class="loading">
                Enter parameters and click "Analyze Levels" to begin
            </div>
        </div>

        <!-- Backtest Section -->
        <div class="backtest-section" id="backtest-section">
            <div class="section-label">Level Backtesting</div>

            <div class="form-grid">
                <div class="form-group">
                    <label for="backtest_ticker">Backtest Ticker</label>
                    <input type="text" id="backtest_ticker" value="SPY" placeholder="e.g., SPY">
                </div>

                <div class="form-group">
                    <label for="backtest_timeframe">Timeframe</label>
                    <select id="backtest_timeframe">
                        <option value="1d" selected>Daily</option>
                        <option value="1h">1 Hour</option>
                        <option value="4h">4 Hours</option>
                    </select>
                </div>

                <div class="form-group">
                    <label for="backtest_method">Detection Method</label>
                    <select id="backtest_method">
                        <option value="hdbscan">HDBSCAN</option>
                        <option value="neural_network">Neural Network</option>
                        <option value="all">All Methods</option>
                    </select>
                </div>

                <div class="form-group">
                    <label for="test_window">Test Window (bars)</label>
                    <input type="number" id="test_window" value="20" min="5" max="50">
                </div>
            </div>

            <div class="btn-row">
                <button class="btn" onclick="runBacktest()">Run Backtest</button>
                <button class="btn" onclick="viewBacktestHistory()">View History</button>
            </div>

            <div id="backtest_results" class="backtest-results">
                <div class="loading">
                    Configure backtest parameters and click "Run Backtest" to begin
                </div>
            </div>
        </div>
    </div>

    <script>
        const API_BASE = window.location.origin + '/api';

        async function analyzeLevels() {
            const ticker = document.getElementById('ticker').value;
            const timeframe = document.getElementById('timeframe').value;
            const lookback = document.getElementById('lookback').value;
            const dataSource = document.getElementById('data_source').value;

            const resultsDiv = document.getElementById('results');
            resultsDiv.innerHTML = '<div class="loading">Analyzing levels...</div>';

            try {
                const params = new URLSearchParams({
                    ticker: ticker,
                    timeframe: timeframe,
                    lookback: lookback,
                    combine_mode: dataSource
                });

                const response = await fetch(`${API_BASE}/data?${params}`);
                const data = await response.json();

                if (data.success) {
                    displayResults(data);
                } else {
                    resultsDiv.innerHTML = `<div class="error">Error: ${data.error}</div>`;
                }
            } catch (error) {
                resultsDiv.innerHTML = `<div class="error">Network error: ${error.message}</div>`;
            }
        }

        function displayResults(data) {
            const resultsDiv = document.getElementById('results');
            const levels = data.levels;

            let html = `
                <div class="success">
                    <strong>Analysis Complete</strong><br>
                    Data Source: ${data.data_source || 'Unknown'}<br>
                    Current Price: $${data.current_price?.toFixed(2) || 'N/A'}<br>
                    Total Levels: ${countAllLevels(levels)}
                </div>
            `;

            if (levels.structural && levels.structural.length > 0) {
                html += '<h3>Structural Levels</h3>';
                levels.structural.forEach(level => {
                    html += createLevelCard(level);
                });
            }

            if (levels.neuralNetwork && levels.neuralNetwork.length > 0) {
                html += '<h3>Neural Network Levels</h3>';
                levels.neuralNetwork.forEach(level => {
                    html += createLevelCard(level);
                });
            }

            resultsDiv.innerHTML = html;
        }

        function createLevelCard(level) {
            const price = level.price ? level.price.toFixed(2) : 'N/A';
            const strength = level.strength ? (level.strength * 100).toFixed(1) : 'N/A';
            const type = level.type || level.category || 'Unknown';

            return `
                <div class="level-info">
                    <div class="level-price">$${price}</div>
                    <div class="level-type">${type}</div>
                    <div class="level-strength">Strength: ${strength}%</div>
                </div>
            `;
        }

        function countAllLevels(levels) {
            let count = 0;
            Object.values(levels).forEach(levelArray => {
                if (Array.isArray(levelArray)) {
                    count += levelArray.length;
                }
            });
            return count;
        }

        async function runBacktest() {
            const ticker = document.getElementById('backtest_ticker').value;
            const timeframe = document.getElementById('backtest_timeframe').value;
            const method = document.getElementById('backtest_method').value;
            const testWindow = document.getElementById('test_window').value;

            const resultsDiv = document.getElementById('backtest_results');
            resultsDiv.innerHTML = '<div class="loading">Running backtest...</div>';

            try {
                const params = new URLSearchParams({
                    ticker: ticker,
                    timeframe: timeframe,
                    method: method,
                    test_window: testWindow
                });

                const response = await fetch(`${API_BASE}/backtest?${params}`);
                const data = await response.json();

                if (data.success) {
                    displayBacktestResults(data);
                } else {
                    resultsDiv.innerHTML = `<div class="error">Error: ${data.error}</div>`;
                }
            } catch (error) {
                resultsDiv.innerHTML = `<div class="error">Network error: ${error.message}</div>`;
            }
        }

        function displayBacktestResults(data) {
            const resultsDiv = document.getElementById('backtest_results');

            let html = `
                <div class="success">
                    <strong>Backtest Complete</strong><br>
                    Ticker: ${data.ticker} | Timeframe: ${data.timeframe}<br>
                    Method: ${data.method}
                </div>
            `;

            if (data.results) {
                html += `
                    <div class="metric">
                        <div class="metric-label">Total Levels</div>
                        <div class="metric-value">${data.results.total_levels || 0}</div>
                    </div>
                    <div class="metric">
                        <div class="metric-label">Touched Levels</div>
                        <div class="metric-value">${data.results.touched_levels || 0}</div>
                    </div>
                    <div class="metric">
                        <div class="metric-label">Breakouts</div>
                        <div class="metric-value">${data.results.breakout_levels || 0}</div>
                    </div>
                    <div class="metric">
                        <div class="metric-label">Touch Rate</div>
                        <div class="metric-value">${data.results.touch_rate ? (data.results.touch_rate * 100).toFixed(1) + '%' : 'N/A'}</div>
                    </div>
                `;
            }

            resultsDiv.innerHTML = html;
        }

        async function trainNeuralNetwork() {
            const resultsDiv = document.getElementById('results');
            resultsDiv.innerHTML = '<div class="loading">Training neural network... (this may take a few minutes)</div>';

            try {
                const response = await fetch(`${API_BASE}/train-level-detector`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        ticker: 'SPY',
                        timeframe: '1d',
                        epochs: 30
                    })
                });

                const data = await response.json();

                if (data.success) {
                    resultsDiv.innerHTML = `<div class="success">Neural network trained successfully! Model saved to ${data.model_path}</div>`;
                } else {
                    resultsDiv.innerHTML = `<div class="error">Training failed: ${data.error}</div>`;
                }
            } catch (error) {
                resultsDiv.innerHTML = `<div class="error">Network error: ${error.message}</div>`;
            }
        }

        async function initializeData() {
            const resultsDiv = document.getElementById('results');
            resultsDiv.innerHTML = '<div class="loading">Initializing Google Drive data...</div>';

            try {
                const response = await fetch(`${API_BASE}/initialize-data`, {
                    method: 'POST'
                });

                const data = await response.json();

                if (data.success) {
                    resultsDiv.innerHTML = `<div class="success">Google Drive data initialized successfully! Available symbols: ${data.available_symbols?.join(', ') || 'N/A'}</div>`;
                } else {
                    resultsDiv.innerHTML = `<div class="error">Initialization failed: ${data.error}</div>`;
                }
            } catch (error) {
                resultsDiv.innerHTML = `<div class="error">Network error: ${error.message}</div>`;
            }
        }

        function viewBacktestHistory() {
            window.open('/backtest', '_blank');
        }

        document.addEventListener('DOMContentLoaded', function() {
            document.querySelectorAll('input').forEach(input => {
                input.addEventListener('keypress', function(e) {
                    if (e.key === 'Enter') {
                        analyzeLevels();
                    }
                });
            });
        });
    </script>
</body>
</html>
