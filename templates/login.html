<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Level Detection - Login</title>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;0,700;1,300;1,400&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #0a0a0a;
            color: #e8e6e3;
        }

        .login-container {
            width: 100%;
            max-width: 380px;
            padding: 40px;
            animation: fadeIn 0.5s ease-out;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(12px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .logo {
            text-align: center;
            margin-bottom: 48px;
        }

        .logo h1 {
            font-family: 'Cormorant Garamond', serif;
            font-size: 2.2em;
            font-weight: 300;
            letter-spacing: 0.08em;
            margin-bottom: 8px;
        }

        .logo p {
            font-size: 0.7em;
            letter-spacing: 0.2em;
            text-transform: uppercase;
            color: rgba(232, 230, 227, 0.35);
        }

        .form-group {
            margin-bottom: 24px;
        }

        .form-group label {
            display: block;
            font-size: 0.7em;
            font-weight: 500;
            letter-spacing: 0.15em;
            text-transform: uppercase;
            color: rgba(232, 230, 227, 0.5);
            margin-bottom: 8px;
        }

        .form-group input {
            width: 100%;
            padding: 14px 16px;
            background: rgba(232, 230, 227, 0.04);
            border: 1px solid rgba(232, 230, 227, 0.1);
            color: #e8e6e3;
            font-family: 'Inter', sans-serif;
            font-size: 14px;
            transition: all 0.3s ease;
        }

        .form-group input::placeholder {
            color: rgba(232, 230, 227, 0.25);
        }

        .form-group input:focus {
            outline: none;
            border-color: rgba(232, 230, 227, 0.3);
            background: rgba(232, 230, 227, 0.06);
        }

        .login-btn {
            width: 100%;
            padding: 14px;
            background: transparent;
            border: 1px solid rgba(232, 230, 227, 0.2);
            color: #e8e6e3;
            font-family: 'Inter', sans-serif;
            font-size: 0.75em;
            font-weight: 500;
            letter-spacing: 0.15em;
            text-transform: uppercase;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-top: 8px;
        }

        .login-btn:hover {
            background: rgba(232, 230, 227, 0.06);
            border-color: rgba(232, 230, 227, 0.35);
        }

        .login-btn:disabled {
            opacity: 0.4;
            cursor: not-allowed;
        }

        .error {
            background: rgba(235, 87, 87, 0.08);
            color: #eb5757;
            padding: 12px 16px;
            margin-bottom: 20px;
            border-left: 2px solid #eb5757;
            font-size: 0.85em;
        }

        .success {
            background: rgba(111, 207, 151, 0.08);
            color: #6fcf97;
            padding: 12px 16px;
            margin-bottom: 20px;
            border-left: 2px solid #6fcf97;
            font-size: 0.85em;
        }

        .loading {
            color: rgba(232, 230, 227, 0.5);
            text-align: center;
            padding: 16px;
            font-size: 0.85em;
        }

        .loading::after {
            content: '';
            display: inline-block;
            width: 14px;
            height: 14px;
            border: 1.5px solid rgba(232, 230, 227, 0.15);
            border-top-color: rgba(232, 230, 227, 0.6);
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-left: 8px;
            vertical-align: middle;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .demo-info {
            text-align: center;
            margin-top: 32px;
            padding-top: 24px;
            border-top: 1px solid rgba(232, 230, 227, 0.06);
        }

        .demo-info p {
            color: rgba(232, 230, 227, 0.3);
            font-size: 0.75em;
            letter-spacing: 0.05em;
        }

        .demo-info a {
            color: rgba(232, 230, 227, 0.5);
            text-decoration: none;
            border-bottom: 1px solid rgba(232, 230, 227, 0.15);
            transition: all 0.3s ease;
        }

        .demo-info a:hover {
            color: #e8e6e3;
            border-bottom-color: rgba(232, 230, 227, 0.4);
        }

        @media (max-width: 480px) {
            .login-container {
                margin: 20px;
                padding: 30px 20px;
            }

            .logo h1 {
                font-size: 1.8em;
            }
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="logo">
            <h1>Level Detection</h1>
            <p>Advanced Market Analysis</p>
        </div>

        <div id="message"></div>

        <form id="loginForm" onsubmit="handleLogin(event)">
            <div class="form-group">
                <label for="username">Username</label>
                <input
                    type="text"
                    id="username"
                    name="username"
                    placeholder="Enter your username"
                    required
                    autocomplete="username"
                >
            </div>

            <div class="form-group">
                <label for="password">Password</label>
                <input
                    type="password"
                    id="password"
                    name="password"
                    placeholder="Enter your password"
                    required
                    autocomplete="current-password"
                >
            </div>

            <button type="submit" class="login-btn" id="loginBtn">
                Sign In
            </button>
        </form>

        <div class="demo-info">
            <p>Demo account: <a href="#" onclick="fillDemo(event)">user1 / pw</a></p>
        </div>
    </div>

    <script>
        async function handleLogin(event) {
            event.preventDefault();

            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;
            const loginBtn = document.getElementById('loginBtn');
            const messageDiv = document.getElementById('message');

            loginBtn.disabled = true;
            loginBtn.textContent = 'Signing in...';
            messageDiv.innerHTML = '<div class="loading">Authenticating...</div>';

            try {
                const response = await fetch('/api/login', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({ username, password })
                });

                const data = await response.json();

                if (data.success) {
                    messageDiv.innerHTML = '<div class="success">Login successful! Redirecting...</div>';
                    setTimeout(() => {
                        window.location.href = '/';
                    }, 1000);
                } else {
                    messageDiv.innerHTML = `<div class="error">${data.error || 'Login failed'}</div>`;
                    loginBtn.disabled = false;
                    loginBtn.textContent = 'Sign In';
                }
            } catch (error) {
                messageDiv.innerHTML = '<div class="error">Network error. Please try again.</div>';
                loginBtn.disabled = false;
                loginBtn.textContent = 'Sign In';
            }
        }

        function fillDemo(event) {
            event.preventDefault();
            document.getElementById('username').value = 'user1';
            document.getElementById('password').value = 'pw';
            document.getElementById('message').innerHTML = '';
        }

        document.addEventListener('DOMContentLoaded', function() {
            document.getElementById('username').focus();
        });
    </script>
</body>
</html>
