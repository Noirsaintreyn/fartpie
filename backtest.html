<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Level &amp; HOD/LOD Backtest</title>
    <script src="backtest-frontend.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #111;
            color: #e5e5e5;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            padding: 24px;
            min-height: 100vh;
        }
        .page-header {
            max-width: 1200px;
            margin: 0 auto 24px;
        }
        .page-header h1 {
            font-size: 1.75rem;
            color: #fff;
            margin-bottom: 4px;
        }
        .page-header p {
            color: #6b7280;
            font-size: 0.9rem;
        }
        #backtest-app {
            max-width: 1200px;
            margin: 0 auto;
        }
    </style>
</head>
<body>
    <div class="page-header">
        <h1>Walk-Forward Backtest</h1>
        <p>Evaluate level detection algorithms and HOD/LOD predictions against historical data. View results per level and per timeframe.</p>
    </div>
    <div id="backtest-app"></div>

    <script>
        // Inject styles
        const styleTag = document.createElement('style');
        styleTag.textContent = BACKTEST_STYLES;
        document.head.appendChild(styleTag);

        // Initialize
        const bt = new BacktestUI('', null);
        bt.renderForm(document.getElementById('backtest-app'));
    </script>
</body>
</html>
